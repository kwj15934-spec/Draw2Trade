# ── 공통 프록시 설정 ──────────────────────────────────────────
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── HTTP → HTTPS 리다이렉트 ───────────────────────────────────
server {
    listen 80;
    server_name draw2trade.com www.draw2trade.com;
    return 301 https://$host$request_uri;
}

# ── HTTPS 메인 서버 ───────────────────────────────────────────
server {
    listen 443 ssl;
    server_name draw2trade.com www.draw2trade.com;

    ssl_certificate     /etc/letsencrypt/live/draw2trade.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/draw2trade.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── WebSocket 엔드포인트 (Upgrade 헤더 필수) ─────────────
    location /ws/ {
        proxy_pass          http://127.0.0.1:8000;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection $connection_upgrade;
        proxy_set_header    Host       $host;
        proxy_set_header    X-Real-IP  $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  3600s;   # WS 연결 유지 (1시간)
        proxy_send_timeout  3600s;
    }

    # ── 정적 파일 (nginx 직접 서빙) ──────────────────────────
    location /static/ {
        alias   /home/kwj/formeta_project/draw2trade/static/;
        expires 1d;
        add_header Cache-Control "public";
        gzip_static on;
    }

    # ── 일반 HTTP API / 페이지 ────────────────────────────────
    location / {
        proxy_pass            http://127.0.0.1:8000;
        proxy_http_version    1.1;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_read_timeout    120s;
        proxy_connect_timeout 10s;
        # 패턴 검색 스트리밍 응답 버퍼 비활성화
        proxy_buffering       off;
    }
}
