<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>승인 대기 중 - Draw2Trade</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      height: 100%;
      margin: 0;
      background: #0f1117;
      color: #d1d4dc;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: 420px;
      background: #1a1d2e;
      border: 1px solid #2a2e39;
      border-radius: 12px;
      padding: 48px 40px 40px;
      text-align: center;
    }

    .brand {
      font-size: 22px;
      font-weight: 700;
      color: #ff6b35;
      margin-bottom: 32px;
    }

    .icon {
      font-size: 48px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 18px;
      font-weight: 600;
      color: #e0e3ec;
      margin: 0 0 12px;
    }

    p {
      font-size: 13px;
      color: #888;
      line-height: 1.7;
      margin: 0 0 32px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: #1e2130;
      border: 1px solid #2a2e39;
      border-radius: 20px;
      padding: 7px 18px;
      font-size: 12px;
      color: #f0a500;
      margin-bottom: 32px;
    }

    .dot {
      width: 8px;
      height: 8px;
      background: #f0a500;
      border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .btn-logout {
      display: inline-block;
      background: none;
      border: 1px solid #2a2e39;
      border-radius: 5px;
      color: #666;
      font-size: 12px;
      padding: 8px 20px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .btn-logout:hover {
      border-color: #ff6b35;
      color: #d1d4dc;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">Draw2Trade</div>
    <div class="icon">⏳</div>
    <h1>가입 신청이 접수되었습니다</h1>
    <p>
      관리자가 계정을 검토 후 승인해드립니다.<br>
      승인이 완료되면 로그인 페이지에서 접속하실 수 있습니다.
    </p>
    <div class="badge">
      <span class="dot"></span>
      승인 대기 중
    </div>
    <br>
    <button class="btn-logout" id="btn-logout">로그아웃</button>
  </div>

  <script>
    document.getElementById('btn-logout').addEventListener('click', async function() {
      await fetch('/api/auth/logout', { method: 'POST' });
      window.location.href = '/login';
    });
  </script>
  <footer style="padding:32px 24px;text-align:center;color:#4a5568;font-size:13px;border-top:1px solid #1e2130;margin-top:40px;">
    <p style="margin-bottom:8px;">
      &copy; 2026 Draw2Trade &nbsp;·&nbsp;
      <a href="/terms" style="color:#4a5568;text-decoration:none;">이용약관</a> &nbsp;·&nbsp;
      <a href="/privacy" style="color:#4a5568;text-decoration:none;">개인정보 처리방침</a>
    </p>
    <p style="font-size:12px;">
      본 서비스는 투자 참고 정보를 제공하며, 투자 결과에 대한 책임은 이용자에게 있습니다.
    </p>
  </footer>
</body>
</html>
