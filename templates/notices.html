<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공지사항 — Draw2Trade</title>
  <link rel="icon" type="image/svg+xml" href="/static/img/favicon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #0d1117;
      --bg2:    #131722;
      --bg3:    #1e2332;
      --teal:   #26a69a;
      --teal2:  #1a7a70;
      --orange: #ff6b35;
      --text:   #d4d8e2;
      --muted:  #7a8499;
      --border: #2a3145;
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      line-height: 1.6;
    }

    .lp-nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px; height: 60px;
      background: rgba(13,17,23,0.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
    }
    .lp-nav-brand {
      display: flex; align-items: center; gap: 10px;
      font-size: 18px; font-weight: 700; color: var(--orange);
      text-decoration: none;
    }
    .lp-nav-brand img { height: 28px; width: 28px; }
    .lp-nav-links { display: flex; gap: 8px; }
    .btn-outline {
      padding: 7px 18px; border-radius: 6px; font-size: 13px; font-weight: 600;
      border: 1px solid var(--border); background: transparent;
      color: var(--text); cursor: pointer; text-decoration: none;
      transition: border-color .2s, color .2s;
    }
    .btn-outline:hover { border-color: var(--teal); color: var(--teal); }
    .btn-primary {
      padding: 7px 20px; border-radius: 6px; font-size: 13px; font-weight: 600;
      border: none; background: var(--teal); color: #fff;
      cursor: pointer; text-decoration: none; transition: background .2s;
    }
    .btn-primary:hover { background: var(--teal2); }

    .page-wrap {
      max-width: 760px; margin: 0 auto;
      padding: 100px 24px 80px;
    }

    .page-label {
      font-size: 12px; font-weight: 700; letter-spacing: 1.5px;
      color: var(--teal); text-transform: uppercase; margin-bottom: 12px;
    }
    .page-title {
      font-size: clamp(26px, 4vw, 38px); font-weight: 800;
      color: #fff; margin-bottom: 40px;
    }

    .filter-tabs {
      display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 32px;
    }
    .filter-tab {
      padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 600;
      border: 1px solid var(--border); background: transparent;
      color: var(--muted); cursor: pointer; transition: all .15s;
    }
    .filter-tab:hover, .filter-tab.active { border-color: var(--teal); color: var(--teal); background: rgba(38,166,154,.08); }

    .notices-list { display: flex; flex-direction: column; gap: 12px; }

    .notice-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 10px; padding: 20px 24px;
      transition: border-color .2s; cursor: pointer;
    }
    .notice-card:hover { border-color: var(--teal); }
    .notice-card.pinned { border-color: rgba(38,166,154,.4); }

    .notice-header {
      display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap;
    }
    .notice-pin { font-size: 12px; color: var(--teal); font-weight: 700; }
    .notice-badge {
      display: inline-block; padding: 2px 8px; border-radius: 4px;
      font-size: 11px; font-weight: 700;
    }
    .badge-update  { background: rgba(38,166,154,.15); color: var(--teal); }
    .badge-event   { background: rgba(255,107,53,.15); color: var(--orange); }
    .badge-notice  { background: rgba(122,132,153,.15); color: var(--muted); }

    .notice-title {
      font-size: 16px; font-weight: 700; color: #fff; margin-bottom: 6px;
    }
    .notice-preview {
      font-size: 14px; color: var(--muted); white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }
    .notice-date { font-size: 12px; color: var(--muted); margin-top: 10px; }

    .notice-modal-bg {
      display: none; position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,.7); align-items: center; justify-content: center;
    }
    .notice-modal-bg.open { display: flex; }
    .notice-modal {
      background: #1a1d2e; border: 1px solid var(--border);
      border-radius: 12px; padding: 36px;
      width: 100%; max-width: 600px; margin: 24px;
      max-height: 80vh; overflow-y: auto; position: relative;
    }
    .notice-modal-close {
      position: absolute; top: 16px; right: 16px;
      background: none; border: none; color: var(--muted);
      font-size: 20px; cursor: pointer;
    }
    .notice-modal-badge { margin-bottom: 12px; }
    .notice-modal-title {
      font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 6px;
    }
    .notice-modal-date { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
    .notice-modal-body {
      font-size: 15px; color: var(--text); line-height: 1.8;
      white-space: pre-wrap;
    }

    .empty-state {
      text-align: center; padding: 80px 24px;
      color: var(--muted); font-size: 15px;
    }

    footer {
      padding: 40px 24px; text-align: center;
      color: var(--muted); font-size: 13px;
      border-top: 1px solid var(--border);
    }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--teal); }

    @media (max-width: 600px) {
      .lp-nav { padding: 0 16px; height: 52px; }
      .lp-nav-brand { font-size: 15px; gap: 7px; }
      .lp-nav-brand img { height: 22px; width: 22px; }
      .btn-outline { padding: 5px 10px; font-size: 12px; }
      .btn-primary, .btn-primary-nav { padding: 5px 12px; font-size: 12px; }
      .notice-modal { padding: 24px; }
    }
  </style>
</head>
<body>

<nav class="lp-nav">
  <a href="/" class="lp-nav-brand">
    <img src="/static/img/favicon.svg" alt="logo" onerror="this.style.display='none'">
    Draw2Trade
  </a>
  <div class="lp-nav-links">
    <a href="/app" class="btn-primary">시작하기</a>
    <a href="#" onclick="openContact();return false;" class="btn-outline">문의하기</a>
  </div>
</nav>

<div class="page-wrap">
  <div class="page-label">공지사항</div>
  <h1 class="page-title">업데이트 · 이벤트 · 안내</h1>

  <div class="filter-tabs">
    <button class="filter-tab active" onclick="filterNotices('all', this)">전체</button>
    <button class="filter-tab" onclick="filterNotices('update', this)">업데이트</button>
    <button class="filter-tab" onclick="filterNotices('event', this)">이벤트</button>
    <button class="filter-tab" onclick="filterNotices('notice', this)">공지</button>
  </div>

  <div class="notices-list" id="notices-list">
    <div class="empty-state">공지사항을 불러오는 중입니다...</div>
  </div>
</div>

<div class="notice-modal-bg" id="notice-modal-bg" onclick="closeModal(event)">
  <div class="notice-modal">
    <button class="notice-modal-close" onclick="closeModal()">✕</button>
    <div class="notice-modal-badge" id="modal-badge"></div>
    <div class="notice-modal-title" id="modal-title"></div>
    <div class="notice-modal-date" id="modal-date"></div>
    <div class="notice-modal-body" id="modal-body"></div>
  </div>
</div>

<footer>
  <p style="margin-bottom:8px;">
    &copy; 2026 Draw2Trade &nbsp;·&nbsp;
    <a href="#" onclick="openContact();return false;">문의하기</a> &nbsp;·&nbsp;
    <a href="/terms">이용약관</a> &nbsp;·&nbsp;
    <a href="/privacy">개인정보 처리방침</a>
  </p>
  <p style="font-size:12px;color:#4a5568;">
    본 서비스는 투자 참고 정보를 제공하며, 투자 결과에 대한 책임은 이용자에게 있습니다.
  </p>
</footer>

<div id="contact-modal" style="display:none; position:fixed; inset:0; z-index:999; background:rgba(0,0,0,.7); align-items:center; justify-content:center;">
  <div style="background:#1a1d2e; border:1px solid #2a3145; border-radius:12px; padding:36px; width:100%; max-width:460px; margin:24px; position:relative;">
    <button onclick="closeContact()" style="position:absolute; top:16px; right:16px; background:none; border:none; color:#7a8499; font-size:20px; cursor:pointer;">✕</button>
    <div style="font-size:18px; font-weight:700; color:#fff; margin-bottom:6px;">문의하기</div>
    <div style="font-size:13px; color:#7a8499; margin-bottom:24px;">회신 받을 이메일을 남겨주세요.</div>
    <div id="contact-success" style="display:none; background:rgba(38,166,154,.12); border:1px solid #26a69a; border-radius:8px; padding:14px; color:#26a69a; font-size:14px; text-align:center; margin-bottom:16px;">
      문의가 접수됐습니다. 빠르게 답변 드리겠습니다.
    </div>
    <form id="contact-form" onsubmit="submitContact(event)">
      <div style="margin-bottom:14px;">
        <label style="font-size:12px; color:#7a8499; display:block; margin-bottom:6px;">이름 (선택)</label>
        <input name="name" type="text" placeholder="홍길동" style="width:100%; background:#0d1117; border:1px solid #2a3145; border-radius:6px; padding:10px 12px; color:#d4d8e2; font-size:14px; outline:none;">
      </div>
      <div style="margin-bottom:14px;">
        <label style="font-size:12px; color:#7a8499; display:block; margin-bottom:6px;">이메일 <span style="color:#ff6b35;">*</span></label>
        <input name="email" type="email" placeholder="example@email.com" required style="width:100%; background:#0d1117; border:1px solid #2a3145; border-radius:6px; padding:10px 12px; color:#d4d8e2; font-size:14px; outline:none;">
      </div>
      <div style="margin-bottom:22px;">
        <label style="font-size:12px; color:#7a8499; display:block; margin-bottom:6px;">문의 내용 <span style="color:#ff6b35;">*</span></label>
        <textarea name="message" rows="4" placeholder="궁금한 점이나 의견을 남겨주세요." required style="width:100%; background:#0d1117; border:1px solid #2a3145; border-radius:6px; padding:10px 12px; color:#d4d8e2; font-size:14px; outline:none; resize:vertical;"></textarea>
      </div>
      <button type="submit" id="contact-submit" style="width:100%; padding:12px; background:#26a69a; border:none; border-radius:8px; color:#fff; font-size:15px; font-weight:700; cursor:pointer;">보내기</button>
    </form>
  </div>
</div>

<script>
  var allNotices = [];
  var currentFilter = 'all';

  var BADGE = {
    update: '<span class="notice-badge badge-update">업데이트</span>',
    event:  '<span class="notice-badge badge-event">이벤트</span>',
    notice: '<span class="notice-badge badge-notice">공지</span>',
  };
  var TYPE_KO = { update: '업데이트', event: '이벤트', notice: '공지' };

  async function loadNotices() {
    try {
      var res = await fetch('/api/notices');
      allNotices = await res.json();
      render();
    } catch {
      document.getElementById('notices-list').innerHTML =
        '<div class="empty-state">공지사항을 불러올 수 없습니다.</div>';
    }
  }

  function filterNotices(type, el) {
    currentFilter = type;
    document.querySelectorAll('.filter-tab').forEach(function(t){ t.classList.remove('active'); });
    el.classList.add('active');
    render();
  }

  function render() {
    var list = currentFilter === 'all'
      ? allNotices
      : allNotices.filter(function(n){ return n.type === currentFilter; });
    var el = document.getElementById('notices-list');
    if (!list.length) {
      el.innerHTML = '<div class="empty-state">해당 유형의 공지가 없습니다.</div>';
      return;
    }
    el.innerHTML = list.map(function(n) {
      var pin = n.pinned ? '<span class="notice-pin">📌</span>' : '';
      return '<div class="notice-card' + (n.pinned ? ' pinned' : '') + '" onclick="openModal(' + n.id + ')">' +
        '<div class="notice-header">' + pin + (BADGE[n.type] || BADGE.notice) + '</div>' +
        '<div class="notice-title">' + escHtml(n.title) + '</div>' +
        '<div class="notice-preview">' + escHtml(n.content) + '</div>' +
        '<div class="notice-date">' + n.date + '</div>' +
        '</div>';
    }).join('');
  }

  function openModal(id) {
    var n = allNotices.find(function(x){ return x.id === id; });
    if (!n) return;
    document.getElementById('modal-badge').innerHTML = BADGE[n.type] || BADGE.notice;
    document.getElementById('modal-title').textContent = n.title;
    document.getElementById('modal-date').textContent = n.date;
    document.getElementById('modal-body').textContent = n.content;
    document.getElementById('notice-modal-bg').classList.add('open');
  }

  function closeModal(e) {
    if (!e || e.target === document.getElementById('notice-modal-bg') || !e.target) {
      document.getElementById('notice-modal-bg').classList.remove('open');
    }
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function openContact() {
    var m = document.getElementById('contact-modal');
    m.style.display = 'flex';
    document.getElementById('contact-success').style.display = 'none';
    document.getElementById('contact-form').style.display = 'block';
    document.getElementById('contact-submit').disabled = false;
  }
  function closeContact() {
    document.getElementById('contact-modal').style.display = 'none';
  }
  document.getElementById('contact-modal').addEventListener('click', function(e) {
    if (e.target === this) closeContact();
  });
  async function submitContact(e) {
    e.preventDefault();
    var btn = document.getElementById('contact-submit');
    btn.disabled = true; btn.textContent = '전송 중...';
    var body = new FormData(e.target);
    try {
      var res = await fetch('/api/contact', { method: 'POST', body: body });
      var data = await res.json();
      if (data.ok) {
        e.target.style.display = 'none';
        document.getElementById('contact-success').style.display = 'block';
        e.target.reset();
      } else {
        btn.disabled = false; btn.textContent = '보내기';
        alert(data.error || '오류가 발생했습니다.');
      }
    } catch {
      btn.disabled = false; btn.textContent = '보내기';
      alert('전송 중 오류가 발생했습니다.');
    }
  }

  loadNotices();
</script>
</body>
</html>
