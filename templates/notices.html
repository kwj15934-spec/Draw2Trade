<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공지사항 — Draw2Trade</title>
  <link rel="icon" type="image/svg+xml" href="/static/img/favicon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:     #0f0f12;
      --bg2:    #18181c;
      --bg3:    #1e1e24;
      --teal:   #26a69a;
      --orange: #ff6b35;
      --text:   #d4d8e2;
      --muted:  #7a8499;
      --border: #27272a;
    }
    html, body { min-height: 100%; background: var(--bg); color: var(--text);
      font-family: 'Pretendard Variable', 'Pretendard', 'Segoe UI', system-ui, sans-serif;
      font-size: 13px; line-height: 1.6; }

    /* ── 네비 ─────────────────────────────────── */
    .d2t-nav {
      position: sticky; top: 0; z-index: 100;
      height: 48px; background: #18181b; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 20px; gap: 8px;
    }
    .d2t-brand {
      font-size: 15px; font-weight: 800; color: var(--orange);
      text-decoration: none; display: flex; align-items: center; gap: 7px; white-space: nowrap;
    }
    .d2t-brand img { height: 22px; width: 22px; object-fit: contain; }
    .nav-spacer { flex: 1; }
    .nav-link {
      display: flex; align-items: center; height: 26px; padding: 0 10px;
      font-size: 11px; color: var(--muted); border: 1px solid var(--border);
      border-radius: 5px; text-decoration: none; white-space: nowrap;
      transition: color .15s, border-color .15s;
    }
    .nav-link:hover  { color: #d4d8e2; border-color: var(--teal); }
    .nav-link.active { color: var(--teal); border-color: var(--teal); }

    /* ── 페이지 ───────────────────────────────── */
    .page-wrap { max-width: 760px; margin: 0 auto; padding: 36px 20px 80px; }

    .page-label { font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
      color: var(--teal); text-transform: uppercase; margin-bottom: 10px; }
    .page-title { font-size: clamp(22px, 4vw, 32px); font-weight: 800; color: #fff; margin-bottom: 8px; }
    .page-desc  { font-size: 13px; color: var(--muted); margin-bottom: 32px; }

    /* ── 필터 탭 ──────────────────────────────── */
    .filter-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 28px; }
    .filter-tab {
      padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 600;
      border: 1px solid var(--border); background: transparent;
      color: var(--muted); cursor: pointer; transition: all .15s;
    }
    .filter-tab:hover, .filter-tab.active {
      border-color: var(--teal); color: var(--teal); background: rgba(38,166,154,.08);
    }

    /* ── 공지 카드 ────────────────────────────── */
    .notices-list { display: flex; flex-direction: column; gap: 10px; }

    .notice-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 12px; padding: 18px 20px;
      transition: border-color .15s, transform .1s; cursor: pointer;
    }
    .notice-card:hover { border-color: rgba(38,166,154,.45); transform: translateY(-1px); }
    .notice-card.pinned { border-color: rgba(38,166,154,.3); background: rgba(38,166,154,.03); }

    .notice-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
    .notice-pin { font-size: 12px; color: var(--teal); font-weight: 700; }
    .notice-badge {
      display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700;
    }
    .badge-update { background: rgba(38,166,154,.15); color: var(--teal); }
    .badge-event  { background: rgba(255,107,53,.12); color: var(--orange); }
    .badge-notice { background: rgba(122,132,153,.12); color: var(--muted); }

    .notice-title { font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 5px; }
    .notice-preview {
      font-size: 12px; color: var(--muted); white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; margin-bottom: 10px;
    }
    .notice-footer { display: flex; align-items: center; gap: 12px; }
    .notice-date { font-size: 11px; color: var(--muted); }
    .notice-views { font-size: 11px; color: #4a5568; }

    /* ── 이미지 썸네일 (카드에 있을 때) ─────── */
    .notice-thumb {
      width: 100%; max-height: 180px; object-fit: cover;
      border-radius: 8px; margin-bottom: 12px; display: block;
    }

    /* ── 모달 ─────────────────────────────────── */
    .modal-bg {
      display: none; position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,.75); align-items: center; justify-content: center;
    }
    .modal-bg.open { display: flex; }
    .modal-box {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 14px; width: 100%; max-width: 640px; margin: 20px;
      max-height: 88vh; overflow-y: auto; position: relative;
    }
    .modal-img {
      width: 100%; max-height: 280px; object-fit: cover;
      border-radius: 14px 14px 0 0; display: none;
    }
    .modal-content { padding: 28px 32px 32px; }
    .modal-close {
      position: absolute; top: 14px; right: 14px;
      background: rgba(0,0,0,.4); border: none; color: #aaa;
      font-size: 18px; cursor: pointer; border-radius: 50%;
      width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
      z-index: 10; transition: background .15s;
    }
    .modal-close:hover { background: rgba(255,255,255,.15); }
    .modal-badge-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .modal-title {
      font-size: 20px; font-weight: 800; color: #fff; margin-bottom: 6px; line-height: 1.3;
    }
    .modal-meta { font-size: 11px; color: var(--muted); margin-bottom: 20px; }
    .modal-body {
      font-size: 14px; color: var(--text); line-height: 1.8;
      white-space: pre-wrap; border-top: 1px solid rgba(255,255,255,.06); padding-top: 16px;
    }

    /* ── 빈 상태 / 스피너 ─────────────────── */
    .empty-state { text-align: center; padding: 60px 24px; color: var(--muted); font-size: 14px; }
    .n-spinner {
      width: 26px; height: 26px; margin: 0 auto 12px;
      border: 2px solid rgba(255,255,255,.08); border-top-color: var(--teal);
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 문의 모달 ────────────────────────── */
    .contact-modal {
      display: none; position: fixed; inset: 0; z-index: 999;
      background: rgba(0,0,0,.75); align-items: center; justify-content: center;
    }
    .contact-modal.open { display: flex; }
    .contact-box {
      background: var(--bg2); border: 1px solid var(--border); border-radius: 14px;
      padding: 32px; width: 100%; max-width: 440px; margin: 20px; position: relative;
    }
    .contact-title { font-size: 17px; font-weight: 800; color: #fff; margin-bottom: 4px; }
    .contact-sub   { font-size: 12px; color: var(--muted); margin-bottom: 20px; }
    .form-group { margin-bottom: 14px; }
    .form-label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 5px; }
    .form-input {
      width: 100%; background: var(--bg3); border: 1px solid var(--border);
      border-radius: 7px; padding: 9px 12px; color: var(--text); font-size: 13px; outline: none;
      transition: border-color .15s;
    }
    .form-input:focus { border-color: var(--teal); }
    .btn-submit {
      width: 100%; padding: 12px; background: var(--teal); border: none;
      border-radius: 8px; color: #fff; font-size: 14px; font-weight: 700; cursor: pointer;
      transition: background .15s;
    }
    .btn-submit:hover { background: #1a7a70; }
    .btn-submit:disabled { opacity: .5; cursor: not-allowed; }
    .contact-success {
      display: none; background: rgba(38,166,154,.12); border: 1px solid var(--teal);
      border-radius: 8px; padding: 14px; color: var(--teal); font-size: 13px;
      text-align: center; margin-bottom: 16px;
    }

    footer {
      padding: 32px 20px; text-align: center; color: var(--muted); font-size: 11px;
      border-top: 1px solid var(--border);
    }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--teal); }
  </style>
  <link rel="preconnect" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
</head>
<body>

<!-- ── 네비게이션 ───────────────────────────────── -->
<nav class="d2t-nav">
  <a href="/" class="d2t-brand">
    <img src="/static/img/logo.png" alt="Draw2Trade" onerror="this.src='/static/img/favicon.svg'">
    Draw2Trade
  </a>
  <div class="nav-spacer"></div>
  <a href="/news"    class="nav-link">📰 뉴스</a>
  <a href="/feed"    class="nav-link">📊 피드</a>
  <a href="/notices" class="nav-link active">📢 공지</a>
  <a href="/app"     class="nav-link">차트 앱 →</a>
</nav>

<!-- ── 본문 ─────────────────────────────────────── -->
<div class="page-wrap">
  <div class="page-label">공지사항</div>
  <h1 class="page-title">업데이트 · 이벤트 · 안내</h1>
  <p class="page-desc">Draw2Trade 최신 소식과 서비스 안내를 확인하세요.</p>

  <div class="filter-tabs">
    <button class="filter-tab active" onclick="filterNotices('all', this)">전체</button>
    <button class="filter-tab" onclick="filterNotices('update', this)">업데이트</button>
    <button class="filter-tab" onclick="filterNotices('event', this)">이벤트</button>
    <button class="filter-tab" onclick="filterNotices('notice', this)">공지</button>
  </div>

  <div class="notices-list" id="notices-list">
    <div class="empty-state">
      <div class="n-spinner"></div>
      공지사항을 불러오는 중입니다…
    </div>
  </div>
</div>

<!-- ── 공지 상세 모달 ─────────────────────────── -->
<div class="modal-bg" id="notice-modal-bg" onclick="closeModal(event)">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <img class="modal-img" id="modal-img" src="" alt="">
    <div class="modal-content">
      <div class="modal-badge-row" id="modal-badge"></div>
      <div class="modal-title" id="modal-title"></div>
      <div class="modal-meta" id="modal-meta"></div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>
</div>

<!-- ── 문의 모달 ───────────────────────────────── -->
<div class="contact-modal" id="contact-modal" onclick="if(event.target===this)closeContact()">
  <div class="contact-box">
    <button onclick="closeContact()" style="position:absolute;top:14px;right:14px;background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;">✕</button>
    <div class="contact-title">문의하기</div>
    <div class="contact-sub">회신 받을 이메일을 남겨주세요.</div>
    <div class="contact-success" id="contact-success">문의가 접수됐습니다. 빠르게 답변 드리겠습니다.</div>
    <form id="contact-form" onsubmit="submitContact(event)">
      <div class="form-group">
        <label class="form-label">이름 (선택)</label>
        <input name="name" type="text" placeholder="홍길동" class="form-input">
      </div>
      <div class="form-group">
        <label class="form-label">이메일 <span style="color:var(--teal);">*</span></label>
        <input name="email" type="email" placeholder="example@email.com" required class="form-input">
      </div>
      <div class="form-group" style="margin-bottom:20px;">
        <label class="form-label">문의 내용 <span style="color:var(--teal);">*</span></label>
        <textarea name="message" rows="4" placeholder="궁금한 점이나 의견을 남겨주세요." required class="form-input" style="resize:vertical;"></textarea>
      </div>
      <button type="submit" class="btn-submit" id="contact-submit">보내기</button>
    </form>
  </div>
</div>

<footer>
  <p style="margin-bottom:6px;">
    &copy; 2026 Draw2Trade &nbsp;·&nbsp;
    <a href="#" onclick="openContact();return false;">문의하기</a> &nbsp;·&nbsp;
    <a href="/terms">이용약관</a> &nbsp;·&nbsp;
    <a href="/privacy">개인정보 처리방침</a>
  </p>
  <p style="margin-top:4px;">상호: FORMETA &nbsp;|&nbsp; 대표자: 김원준 &nbsp;|&nbsp; 사업자등록번호: 536-32-01566 &nbsp;|&nbsp; 이메일: <a href="mailto:kwj15934@formeta.kr">kwj15934@formeta.kr</a></p>
</footer>

<script>
  var allNotices = [];
  var currentFilter = 'all';

  var BADGE = {
    update: '<span class="notice-badge badge-update">업데이트</span>',
    event:  '<span class="notice-badge badge-event">이벤트</span>',
    notice: '<span class="notice-badge badge-notice">공지</span>',
  };

  /* ── 공지 로드 ─────────────────────────── */
  async function loadNotices() {
    try {
      var res = await fetch('/api/notices');
      allNotices = await res.json();
      render();
    } catch {
      document.getElementById('notices-list').innerHTML =
        '<div class="empty-state">공지사항을 불러올 수 없습니다.</div>';
    }
  }

  function filterNotices(type, el) {
    currentFilter = type;
    document.querySelectorAll('.filter-tab').forEach(function (t) { t.classList.remove('active'); });
    el.classList.add('active');
    render();
  }

  function render() {
    var list = currentFilter === 'all'
      ? allNotices
      : allNotices.filter(function (n) { return n.type === currentFilter; });
    var el = document.getElementById('notices-list');
    if (!list.length) {
      el.innerHTML = '<div class="empty-state">해당 유형의 공지가 없습니다.</div>';
      return;
    }
    el.innerHTML = list.map(function (n) {
      var pin = n.pinned ? '<span class="notice-pin">📌</span>' : '';
      // content에서 [IMG:url] 패턴 파싱
      var imgMatch = n.content.match(/\[IMG:(https?:\/\/[^\]]+)\]/);
      var imgHtml  = imgMatch
        ? '<img class="notice-thumb" src="' + escHtml(imgMatch[1]) + '" alt="" onerror="this.style.display=\'none\'">'
        : '';
      var preview  = escHtml(n.content.replace(/\[IMG:[^\]]+\]/g, '').trim().slice(0, 80));

      return '<div class="notice-card' + (n.pinned ? ' pinned' : '') + '" onclick="openModal(' + n.id + ')">' +
        imgHtml +
        '<div class="notice-header">' + pin + (BADGE[n.type] || BADGE.notice) + '</div>' +
        '<div class="notice-title">' + escHtml(n.title) + '</div>' +
        '<div class="notice-preview">' + preview + '</div>' +
        '<div class="notice-footer">' +
          '<span class="notice-date">' + n.date + '</span>' +
          (n.views ? '<span class="notice-views">👁 ' + n.views + '</span>' : '') +
        '</div>' +
      '</div>';
    }).join('');
  }

  /* ── 모달 열기 ─────────────────────────── */
  async function openModal(id) {
    // 로컬에서 먼저 표시
    var n = allNotices.find(function (x) { return x.id === id; });
    if (!n) return;
    _renderModal(n);

    // 조회수 갱신 버전으로 교체 (비동기)
    try {
      var res = await fetch('/api/notices/' + id);
      if (res.ok) {
        var fresh = await res.json();
        // 조회수 업데이트
        n.views = fresh.views;
        _renderModal(fresh);
      }
    } catch {}
  }

  function _renderModal(n) {
    var imgMatch = n.content.match(/\[IMG:(https?:\/\/[^\]]+)\]/);
    var imgEl = document.getElementById('modal-img');
    if (imgMatch) {
      imgEl.src = imgMatch[1];
      imgEl.style.display = 'block';
    } else {
      imgEl.style.display = 'none';
      imgEl.src = '';
    }

    document.getElementById('modal-badge').innerHTML = BADGE[n.type] || BADGE.notice;
    document.getElementById('modal-title').textContent = n.title;
    document.getElementById('modal-meta').textContent =
      n.date + (n.views != null ? '  ·  조회 ' + n.views : '');
    document.getElementById('modal-body').textContent =
      n.content.replace(/\[IMG:[^\]]+\]/g, '').trim();
    document.getElementById('notice-modal-bg').classList.add('open');
  }

  function closeModal(e) {
    if (!e || e.target === document.getElementById('notice-modal-bg') || !e.target) {
      document.getElementById('notice-modal-bg').classList.remove('open');
    }
  }

  /* ── 문의 ──────────────────────────────── */
  function openContact() {
    document.getElementById('contact-modal').classList.add('open');
    document.getElementById('contact-success').style.display = 'none';
    document.getElementById('contact-form').style.display = 'block';
    document.getElementById('contact-submit').disabled = false;
  }
  function closeContact() {
    document.getElementById('contact-modal').classList.remove('open');
  }
  async function submitContact(e) {
    e.preventDefault();
    var btn = document.getElementById('contact-submit');
    btn.disabled = true; btn.textContent = '전송 중…';
    var body = new FormData(e.target);
    try {
      var res  = await fetch('/api/contact', { method: 'POST', body: body });
      var data = await res.json();
      if (data.ok) {
        e.target.style.display = 'none';
        document.getElementById('contact-success').style.display = 'block';
        e.target.reset();
      } else {
        btn.disabled = false; btn.textContent = '보내기';
        alert(data.error || '오류가 발생했습니다.');
      }
    } catch {
      btn.disabled = false; btn.textContent = '보내기';
      alert('전송 중 오류가 발생했습니다.');
    }
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  loadNotices();
</script>
</body>
</html>
