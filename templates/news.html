<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>뉴스 — Draw2Trade</title>
  <link rel="icon" type="image/svg+xml" href="/static/img/favicon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:     #0f0f12;
      --bg2:    #18181c;
      --bg3:    #1e1e24;
      --teal:   #26a69a;
      --orange: #ff6b35;
      --red:    #ef5350;
      --blue:   #5b8def;
      --text:   #d4d8e2;
      --muted:  #7a8499;
      --border: #27272a;
    }
    html, body {
      height: 100%; background: var(--bg); color: var(--text);
      font-family: 'Pretendard Variable', 'Pretendard', 'Segoe UI', system-ui, sans-serif;
      font-size: 13px; line-height: 1.5;
    }

    /* ── 네비 ─────────────────────────────────── */
    .d2t-nav {
      position: sticky !important; top: 0 !important; z-index: 100 !important;
      height: 46px !important; background: #18181b !important;
      border-bottom: 1px solid var(--border) !important;
      display: flex !important; align-items: center !important;
      padding: 0 20px !important; gap: 0 !important;
      box-sizing: border-box !important;
    }
    .d2t-brand {
      font-size: 15px !important; font-weight: 800 !important; color: var(--orange) !important;
      text-decoration: none !important; display: flex !important; align-items: center !important;
      gap: 7px !important; white-space: nowrap !important;
      flex-shrink: 0 !important; margin-right: 16px !important;
    }
    .d2t-brand img { height: 22px !important; width: 22px !important; object-fit: contain !important; }
    .d2t-nav-sep {
      width: 1px !important; height: 16px !important; background: #3f3f46 !important;
      flex-shrink: 0 !important; margin: 0 20px 0 0 !important;
    }
    .d2t-nav-tabs {
      display: flex !important; align-items: center !important;
      gap: 30px !important; flex-shrink: 0 !important;
    }
    .nav-spacer { flex: 1 !important; min-width: 0 !important; }
    .nav-link {
      font-size: 13px !important; font-weight: 500 !important;
      color: #71717a !important; text-decoration: none !important;
      background: none !important; border: none !important;
      border-bottom: 2px solid transparent !important; box-shadow: none !important;
      padding: 0 !important; margin: 0 !important; white-space: nowrap !important;
      transition: color .15s, border-color .15s !important;
      line-height: 46px !important; display: inline-block !important;
    }
    .nav-link:hover { color: #d4d8e2 !important; text-decoration: none !important; border-bottom-color: #3f3f46 !important; }
    .nav-link.active { color: var(--teal) !important; border-bottom: 2px solid var(--teal) !important; font-weight: 700 !important; }

    /* ── 레이아웃 ──────────────────────────────── */
    .page-layout {
      max-width: 1100px; margin: 0 auto;
      display: grid; grid-template-columns: 1fr 300px;
      gap: 28px; padding: 28px 20px 60px;
    }
    @media (max-width: 800px) {
      .page-layout { grid-template-columns: 1fr; }
      .news-sidebar { display: none; }
    }

    /* ── 페이지 헤더 ───────────────────────────── */
    .page-header { margin-bottom: 20px; }
    .page-header h1 { font-size: 20px; font-weight: 800; color: #fff; margin-bottom: 4px; }
    .page-header p  { font-size: 12px; color: var(--muted); }

    /* ── 서브탭 ───────────────────────────────── */
    .news-tabs {
      display: flex; gap: 0; border-bottom: 1px solid var(--border);
      margin-bottom: 16px; overflow-x: auto; scrollbar-width: none;
    }
    .news-tabs::-webkit-scrollbar { display: none; }
    .news-tab {
      flex-shrink: 0; padding: 8px 16px; font-size: 12px; font-weight: 600;
      color: var(--muted); background: none; border: none; border-bottom: 2px solid transparent;
      cursor: pointer; transition: color .15s, border-color .15s; white-space: nowrap;
    }
    .news-tab.active { color: #d4d8e2; border-bottom-color: var(--teal); }
    .news-tab:hover  { color: #a0a8b8; }

    /* ── 검색바 ───────────────────────────────── */
    .news-search-row { display: flex; gap: 8px; margin-bottom: 18px; }
    .news-search-input {
      flex: 1; background: var(--bg3); border: 1px solid var(--border);
      border-radius: 7px; padding: 8px 12px; color: var(--text);
      font-size: 12px; outline: none; transition: border-color .15s;
    }
    .news-search-input:focus { border-color: var(--teal); }
    .news-search-input::placeholder { color: var(--muted); }

    /* ── 뉴스 카드 ────────────────────────────── */
    .news-list { display: flex; flex-direction: column; gap: 0; }
    .news-card {
      display: flex; gap: 14px; padding: 14px 0;
      border-bottom: 1px solid rgba(255,255,255,.05);
      text-decoration: none; color: inherit; transition: background .1s;
      border-radius: 8px;
    }
    .news-card:hover { background: rgba(255,255,255,.025); padding-left: 8px; padding-right: 8px; }

    .news-thumb {
      flex-shrink: 0; width: 80px; height: 62px;
      border-radius: 7px; overflow: hidden;
      background: var(--bg3); display: flex; align-items: center; justify-content: center;
    }
    .news-thumb img { width: 100%; height: 100%; object-fit: cover; }
    /* 폴백: 미니 캔들차트 SVG */
    .news-thumb-svg {
      display: flex; align-items: center; justify-content: center;
      width: 100%; height: 100%;
      background: linear-gradient(135deg, #16161a 0%, #1a1a20 100%);
    }
    .news-thumb-svg svg { width: 52px; height: 38px; }

    .news-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 5px; }
    .news-source-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .news-source { font-size: 10px; font-weight: 700; color: var(--muted); }
    .news-market-badge {
      font-size: 9px; font-weight: 700; padding: 1px 5px;
      border-radius: 3px; letter-spacing: 0.3px;
    }
    .badge-kr { background: rgba(38,166,154,.15); color: var(--teal); }
    .badge-us { background: rgba(91,141,239,.15); color: var(--blue); }

    .news-title {
      font-size: 13px; font-weight: 600; color: #d4d8e2; line-height: 1.45;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .news-card:hover .news-title { color: #4dd0c4; }

    .news-meta-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-top: 2px; }
    .news-time { font-size: 10px; color: var(--muted); }

    /* 종목 배지 */
    .news-stock-chips { display: flex; gap: 4px; flex-wrap: wrap; }
    .news-chip {
      display: inline-flex; align-items: center; gap: 3px;
      font-size: 10px; padding: 2px 7px; border-radius: 4px;
      cursor: pointer; transition: opacity .15s; border: 1px solid transparent;
      font-weight: 600; letter-spacing: 0.2px;
    }
    .news-chip:hover { opacity: 0.75; }
    .chip-up   { background: rgba(239,83,80,.12); color: #ef5350; border-color: rgba(239,83,80,.25); }
    .chip-down { background: rgba(38,166,154,.10); color: var(--teal); border-color: rgba(38,166,154,.2); }
    .chip-flat { background: rgba(120,120,140,.12); color: #9aa; border-color: rgba(120,120,140,.2); }

    /* ── 로딩/빈 상태 ────────────────────────── */
    .news-empty {
      text-align: center; padding: 60px 20px;
      color: var(--muted); font-size: 14px;
    }
    .news-spinner {
      width: 28px; height: 28px; margin: 0 auto 12px;
      border: 2px solid rgba(255,255,255,.08);
      border-top-color: var(--teal);
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 페이지네이션 ─────────────────────────── */
    .news-pagination {
      display: flex; justify-content: center; gap: 6px;
      margin-top: 24px; flex-wrap: wrap;
    }
    .page-btn {
      width: 32px; height: 32px; border-radius: 6px; border: 1px solid var(--border);
      background: none; color: var(--muted); font-size: 12px; cursor: pointer;
      transition: all .15s;
    }
    .page-btn:hover, .page-btn.active {
      border-color: var(--teal); color: var(--teal); background: rgba(38,166,154,.08);
    }

    /* ── 사이드바 ─────────────────────────────── */
    .news-sidebar { display: flex; flex-direction: column; gap: 16px; }
    .sidebar-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 10px; overflow: hidden;
    }
    .sidebar-card-head {
      padding: 12px 14px 0;
    }
    .sidebar-card-title {
      font-size: 11px; font-weight: 700; color: var(--muted);
      letter-spacing: .8px; text-transform: uppercase; margin-bottom: 2px;
    }
    .sidebar-card-sub {
      font-size: 10px; color: #52525b; margin-bottom: 10px;
    }
    /* 사이드바 KR/US 탭 */
    .sidebar-tabs {
      display: flex; border-bottom: 1px solid var(--border);
      margin: 0;
    }
    .sidebar-tab {
      flex: 1; padding: 7px 0; font-size: 11px; font-weight: 700;
      color: var(--muted); background: none; border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer; transition: color .15s, border-color .15s;
      text-align: center;
    }
    .sidebar-tab.active { color: #d4d8e2; border-bottom-color: var(--teal); }
    .sidebar-tab:hover  { color: #a0a8b8; }

    .sidebar-body { padding: 4px 0 8px; }

    /* 전일 거래대금 순위 행 */
    .vol-row {
      position: relative;
      display: flex; align-items: center;
      padding: 7px 14px; cursor: pointer;
      transition: background .1s; overflow: hidden;
    }
    .vol-row:hover { background: rgba(255,255,255,.03); }

    /* Progress Bar — 거래량 비율 배경 */
    .vol-bar {
      position: absolute; left: 0; top: 0; bottom: 0;
      background: rgba(38,166,154,.06);
      transition: width .4s cubic-bezier(.4,0,.2,1);
      pointer-events: none; z-index: 0;
      border-right: 1px solid rgba(38,166,154,.12);
    }
    .vol-row > * { position: relative; z-index: 1; }

    .vol-rank {
      font-size: 10px; font-weight: 700; color: #52525b;
      width: 18px; flex-shrink: 0; text-align: right; margin-right: 10px;
    }
    .vol-rank.top3 { color: var(--teal); }
    .vol-info { flex: 1; min-width: 0; }
    .vol-name {
      font-size: 12px; font-weight: 600; color: #d4d8e2;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .vol-code { font-size: 10px; color: var(--muted); margin-top: 1px; }
    .vol-right { display: flex; flex-direction: column; align-items: flex-end; flex-shrink: 0; margin-left: 8px; gap: 2px; }
    .vol-pct {
      font-size: 12px; font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
    }
    .pct-up   { color: #ef5350; }
    .pct-down { color: var(--teal); }
    .pct-flat { color: #555; }
    .vol-amt  { font-size: 9px; color: #52525b; font-family: 'JetBrains Mono', monospace; }

    /* 사이드바 기준 텍스트 */
    .sidebar-as-of {
      font-size: 10px; color: #3f3f46;
      padding: 8px 14px 4px; text-align: right;
      border-top: 1px solid rgba(255,255,255,.03);
    }

    /* 빠른 이동 */
    .quick-links { padding: 12px 14px; display: flex; flex-direction: column; gap: 6px; }
    .quick-link {
      font-size: 12px; color: var(--muted); text-decoration: none;
      padding: 6px 8px; background: var(--bg3); border-radius: 6px;
      transition: color .15s, background .15s;
    }
    .quick-link:hover { color: var(--teal); background: rgba(38,166,154,.07); }
    .quick-link.primary { color: var(--teal); background: rgba(38,166,154,.07); }

    footer {
      padding: 32px 20px; text-align: center; color: var(--muted); font-size: 11px;
      border-top: 1px solid var(--border); max-width: 1100px; margin: 0 auto;
    }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--teal); }
  </style>

</head>

<script>
(function () {
  'use strict';

  /* ════════════════════════════════════════════
     뉴스 피드
     ════════════════════════════════════════════ */
  var _tab     = 'all';
  var _query   = '';
  var _page    = 1;
  var _perPage = 15;
  var _allItems = [];
  var _krItems  = [];
  var _usItems  = [];

  // 전일 등락률 캐시 { ticker: "+1.23" }
  var _rateCache      = {};
  var _rateNeedsFetch = true;

  /* KR: 섹터별 대표 종목 (삼성 편중 해소) */
  var _KR_SYMBOLS = [
    '005930', // 삼성전자
    '000660', // SK하이닉스
    '035420', // NAVER
    '035720', // 카카오
    '005380', // 현대차
    '051910', // LG화학
    '006400', // 삼성SDI
    '028260', // 삼성물산
    '105560', // KB금융
    '055550', // 신한지주
  ];

  /* US: S&P 500 대형주 */
  var _US_SYMBOLS = ['AAPL', 'NVDA', 'TSLA', 'META', 'GOOGL', 'MSFT', 'AMZN', 'JPM'];

  /* ── 뉴스 fetch ─────────────────────────────── */
  function _fetchAll() {
    setLoading();
    var fetches = _KR_SYMBOLS.concat(_US_SYMBOLS).map(function (sym) {
      return fetch('/api/v1/stock/news/' + encodeURIComponent(sym))
        .then(function (r) { return r.ok ? r.json() : null; })
        .catch(function () { return null; });
    });
    Promise.all(fetches).then(function (results) {
      _krItems = []; _usItems = [];
      results.forEach(function (d, i) {
        if (!d || !d.items) return;
        var isUs = i >= _KR_SYMBOLS.length;
        var sym  = isUs ? _US_SYMBOLS[i - _KR_SYMBOLS.length] : _KR_SYMBOLS[i];
        d.items.forEach(function (item) {
          var entry = Object.assign({}, item, { _symbol: sym, _market: isUs ? 'US' : 'KR' });
          if (isUs) _usItems.push(entry); else _krItems.push(entry);
        });
      });
      _allItems = _krItems.concat(_usItems).sort(function (a, b) {
        return _parseDate(b.date) - _parseDate(a.date);
      });
      _page = 1;
      render();
    });
  }

  function _parseDate(s) {
    if (!s) return 0;
    var m = s.match(/(\d{4})[.\-\/](\d{2})[.\-\/](\d{2})/);
    if (!m) return 0;
    return new Date(m[1] + '-' + m[2] + '-' + m[3]).getTime();
  }

  /* ── 전일 등락률 fetch (scanner/rise API 사용) ── */
  function _fetchRates(symbols) {
    // scanner/rise에서 이미 로드된 데이터가 있으면 재활용
    symbols.forEach(function (sym) {
      if (_rateCache[sym] !== undefined) return;
      // 아직 캐시 없으면 scanner/rise에서 일괄 로드 (첫 호출 시 한 번만)
      _rateCache[sym] = null; // 중복 요청 방지용 플레이스홀더
    });
    if (_rateNeedsFetch) {
      _rateNeedsFetch = false;
      fetch('/api/v1/stock/market/scanner/rise?top_n=50')
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (d) {
          if (!d || !d.items) return;
          d.items.forEach(function (item) {
            _rateCache[item.ticker] = item.change_rate || null;
          });
          render();
        })
        .catch(function () {});
    }
  }

  /* ── 렌더 ───────────────────────────────────── */
  function getFiltered() {
    var src = _tab === 'kr'  ? _krItems
            : _tab === 'us'  ? _usItems
            : _tab === 'hot' ? _allItems.slice().sort(function (a, b) { return (b.agree || 0) - (a.agree || 0); })
            : _allItems;
    if (_query) {
      var q = _query.toLowerCase();
      src = src.filter(function (it) {
        return (it.title || '').toLowerCase().includes(q) ||
               (it._symbol || '').toLowerCase().includes(q);
      });
    }
    return src;
  }

  function render() {
    var items      = getFiltered();
    var total      = items.length;
    var totalPages = Math.max(1, Math.ceil(total / _perPage));
    if (_page > totalPages) _page = totalPages;
    var sliced = items.slice((_page - 1) * _perPage, _page * _perPage);

    // 등락률 미리 fetch (KR만)
    var krSyms = sliced.filter(function (it) { return it._market === 'KR'; })
                       .map(function (it) { return it._symbol; })
                       .filter(function (s, i, arr) { return arr.indexOf(s) === i; });
    _fetchRates(krSyms);

    var listEl = document.getElementById('news-list');
    if (!sliced.length) {
      listEl.innerHTML = '<div class="news-empty">표시할 뉴스가 없습니다.</div>';
      document.getElementById('news-pagination').innerHTML = '';
      return;
    }
    listEl.innerHTML = sliced.map(renderCard).join('');
    renderPagination(totalPages);
  }

  /* 썸네일 폴백 — 미니 캔들차트 SVG (터미널 감성) */
  var _FALLBACK_SVG = '<div class="news-thumb-svg">' +
    '<svg width="52" height="38" viewBox="0 0 52 38" fill="none" xmlns="http://www.w3.org/2000/svg">' +
      /* 캔들 1 — 하락 */
      '<line x1="8" y1="4"  x2="8" y2="32" stroke="#26a69a" stroke-width="1" opacity="0.3"/>' +
      '<rect x="5" y="10" width="6" height="14" rx="1" fill="#26a69a" opacity="0.45"/>' +
      /* 캔들 2 — 상승 */
      '<line x1="18" y1="8"  x2="18" y2="34" stroke="#ef5350" stroke-width="1" opacity="0.3"/>' +
      '<rect x="15" y="14" width="6" height="16" rx="1" fill="#ef5350" opacity="0.45"/>' +
      /* 캔들 3 — 상승 강함 */
      '<line x1="28" y1="6"  x2="28" y2="28" stroke="#ef5350" stroke-width="1" opacity="0.3"/>' +
      '<rect x="25" y="10" width="6" height="16" rx="1" fill="#ef5350" opacity="0.6"/>' +
      /* 캔들 4 — 하락 */
      '<line x1="38" y1="8"  x2="38" y2="30" stroke="#26a69a" stroke-width="1" opacity="0.3"/>' +
      '<rect x="35" y="13" width="6" height="12" rx="1" fill="#26a69a" opacity="0.45"/>' +
      /* 캔들 5 — 상승 */
      '<line x1="48" y1="5"  x2="48" y2="26" stroke="#ef5350" stroke-width="1" opacity="0.3"/>' +
      '<rect x="45" y="8"  width="6" height="14" rx="1" fill="#ef5350" opacity="0.55"/>' +
    '</svg>' +
  '</div>';

  function renderCard(it) {
    var title  = esc(it.title || '');
    var source = esc(it.source || it.type || '뉴스');
    var date   = esc(it.date || '');
    var url    = it.url || '#';
    var sym    = it._symbol || '';
    var mkt    = it._market || 'KR';

    /* 썸네일 — 폴백 처리 */
    var thumbHtml = it.thumbnail
      ? '<img src="' + esc(it.thumbnail) + '" alt="" loading="lazy" onerror="this.parentNode.innerHTML=\'' + _FALLBACK_SVG.replace(/'/g, "\\'") + '\'">'
      : _FALLBACK_SVG;

    var mktBadge = mkt === 'US'
      ? '<span class="news-market-badge badge-us">US</span>'
      : '<span class="news-market-badge badge-kr">KR</span>';

    /* 종목 배지 + 등락률 */
    var chip = '';
    if (sym) {
      var rate = _rateCache[sym];
      var chipClass = 'chip-flat';
      var rateText  = '';
      if (rate != null) {
        var rateNum = parseFloat(rate);
        if (!isNaN(rateNum)) {
          chipClass = rateNum > 0 ? 'chip-up' : rateNum < 0 ? 'chip-down' : 'chip-flat';
          rateText  = ' ' + (rateNum > 0 ? '+' : '') + rateNum.toFixed(2) + '%';
        }
      }
      chip = '<span class="news-chip ' + chipClass + '" onclick="event.preventDefault();goChart(\'' +
             esc(sym) + '\',\'' + mkt + '\')">' + esc(sym) + rateText + '</span>';
    }

    return '<a class="news-card" href="' + esc(url) + '" target="_blank" rel="noopener">' +
      '<div class="news-thumb">' + thumbHtml + '</div>' +
      '<div class="news-body">' +
        '<div class="news-source-row"><span class="news-source">' + source + '</span>' + mktBadge + '</div>' +
        '<div class="news-title">' + title + '</div>' +
        '<div class="news-meta-row">' +
          '<span class="news-time">' + date + '</span>' +
          (chip ? '<div class="news-stock-chips">' + chip + '</div>' : '') +
        '</div>' +
      '</div>' +
    '</a>';
  }

  function renderPagination(total) {
    var el = document.getElementById('news-pagination');
    if (total <= 1) { el.innerHTML = ''; return; }
    var html = '';
    var start = Math.max(1, _page - 2);
    var end   = Math.min(total, _page + 2);
    if (_page > 1) html += '<button class="page-btn" onclick="goPage(' + (_page - 1) + ')">‹</button>';
    for (var i = start; i <= end; i++) {
      html += '<button class="page-btn' + (i === _page ? ' active' : '') + '" onclick="goPage(' + i + ')">' + i + '</button>';
    }
    if (_page < total) html += '<button class="page-btn" onclick="goPage(' + (_page + 1) + ')">›</button>';
    el.innerHTML = html;
  }

  function setLoading() {
    document.getElementById('news-list').innerHTML =
      '<div class="news-empty"><div class="news-spinner"></div>로딩 중…</div>';
    document.getElementById('news-pagination').innerHTML = '';
  }

  /* ════════════════════════════════════════════
     사이드바 — 전일 거래대금 TOP 10
     ════════════════════════════════════════════ */
  var _sidebarMkt = 'kr';

  /* US 고정 대형주 목록 (거래대금 순위 API 없음 → finance API로 등락률만 조회) */
  var _US_TOP = [
    { ticker: 'NVDA',  name: 'NVIDIA' },
    { ticker: 'AAPL',  name: 'Apple' },
    { ticker: 'TSLA',  name: 'Tesla' },
    { ticker: 'MSFT',  name: 'Microsoft' },
    { ticker: 'AMZN',  name: 'Amazon' },
    { ticker: 'META',  name: 'Meta' },
    { ticker: 'GOOGL', name: 'Alphabet' },
    { ticker: 'JPM',   name: 'JPMorgan' },
    { ticker: 'AMD',   name: 'AMD' },
    { ticker: 'NFLX',  name: 'Netflix' },
  ];
  var _krVolData = null;
  var _usRates   = {};   // ticker → change_rate

  function switchSidebarTab(mkt) {
    _sidebarMkt = mkt;
    document.querySelectorAll('.sidebar-tab').forEach(function (b) {
      b.classList.toggle('active', b.dataset.mkt === mkt);
    });
    renderSidebar();
  }
  window.switchSidebarTab = switchSidebarTab;

  /* KR 거래량 순위 fetch */
  function _fetchKrVol() {
    fetch('/api/v1/stock/market/scanner/volume?top_n=10')
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (d) {
        if (d && d.items && d.items.length) {
          _krVolData = d.items;
          if (_sidebarMkt === 'kr') renderSidebar();
        }
      })
      .catch(function () {});
  }

  /* US 종목 finance fetch (등락률 수집) */
  function _fetchUsRates() {
    _US_TOP.forEach(function (t) {
      fetch('/api/v1/stock/finance/' + encodeURIComponent(t.ticker))
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (d) {
          if (!d) return;
          var rate = d.change_rate || (d.price_info && d.price_info.change_rate) || null;
          _usRates[t.ticker] = rate || null;
          if (_sidebarMkt === 'us') renderSidebar();
        })
        .catch(function () { _usRates[t.ticker] = null; });
    });
  }

  /* 거래량 → 읽기 좋은 단위 문자열 */
  function _fmtVol(v) {
    if (!v || isNaN(v)) return '';
    if (v >= 1e8) return (v / 1e8).toFixed(1) + '억주';
    if (v >= 1e4) return (v / 1e4).toFixed(0) + '만주';
    return v.toLocaleString() + '주';
  }

  function renderSidebar() {
    var el = document.getElementById('sidebar-vol-list');

    if (_sidebarMkt === 'kr') {
      if (!_krVolData) {
        el.innerHTML = '<div class="news-empty" style="padding:24px 0;font-size:12px;"><div class="news-spinner"></div>로딩 중…</div>';
        return;
      }
      /* Progress Bar용 최대 거래량 계산 */
      var maxVol = Math.max.apply(null, _krVolData.map(function (d) { return d.volume || 0; })) || 1;

      var html = '';
      _krVolData.forEach(function (item, i) {
        var rate      = parseFloat((item.change_rate || '0').replace('+', ''));
        var isUp      = rate > 0, isDown = rate < 0;
        var pctClass  = isUp ? 'pct-up' : isDown ? 'pct-down' : 'pct-flat';
        var pctText   = isNaN(rate) ? '—' : (isUp ? '+' : '') + rate.toFixed(2) + '%';
        var rankClass = i < 3 ? 'vol-rank top3' : 'vol-rank';
        var barPct    = Math.round(((item.volume || 0) / maxVol) * 100);
        var volLabel  = _fmtVol(item.volume);

        html += '<div class="vol-row" onclick="goChart(\'' + esc(item.ticker) + '\',\'KR\')">' +
          '<div class="vol-bar" style="width:' + barPct + '%"></div>' +
          '<span class="' + rankClass + '">' + (i + 1) + '</span>' +
          '<div class="vol-info">' +
            '<div class="vol-name">' + esc(item.name || item.ticker) + '</div>' +
            '<div class="vol-code">' + esc(item.ticker) + '</div>' +
          '</div>' +
          '<div class="vol-right">' +
            '<span class="vol-pct ' + pctClass + '">' + pctText + '</span>' +
            (volLabel ? '<span class="vol-amt">' + volLabel + '</span>' : '') +
          '</div>' +
        '</div>';
      });
      html += '<div class="sidebar-as-of">전일 종가 기준 거래량 순위</div>';
      el.innerHTML = html;

    } else {
      var anyLoaded = Object.keys(_usRates).length > 0;
      if (!anyLoaded) {
        el.innerHTML = '<div class="news-empty" style="padding:24px 0;font-size:12px;"><div class="news-spinner"></div>로딩 중…</div>';
        return;
      }
      /* US는 거래량 정보 없으므로 |등락률| 기준 bar */
      var maxAbs = Math.max.apply(null,
        _US_TOP.map(function (t) { return Math.abs(parseFloat(_usRates[t.ticker] || '0')); })
      ) || 1;

      var html = '';
      _US_TOP.forEach(function (t, i) {
        var rateRaw  = _usRates[t.ticker];
        var rate     = rateRaw != null ? parseFloat(rateRaw) : NaN;
        var isUp     = !isNaN(rate) && rate > 0;
        var isDown   = !isNaN(rate) && rate < 0;
        var pctClass = isUp ? 'pct-up' : isDown ? 'pct-down' : 'pct-flat';
        var pctText  = isNaN(rate) ? '—' : (isUp ? '+' : '') + rate.toFixed(2) + '%';
        var rankClass = i < 3 ? 'vol-rank top3' : 'vol-rank';
        var barPct   = isNaN(rate) ? 0 : Math.round((Math.abs(rate) / maxAbs) * 100);
        var barColor = isDown ? 'rgba(38,166,154,.06)' : 'rgba(239,83,80,.06)';

        html += '<div class="vol-row" onclick="goChart(\'' + esc(t.ticker) + '\',\'US\')">' +
          '<div class="vol-bar" style="width:' + barPct + '%;background:' + barColor + ';border-right-color:' + (isDown ? 'rgba(38,166,154,.15)' : 'rgba(239,83,80,.15)') + '"></div>' +
          '<span class="' + rankClass + '">' + (i + 1) + '</span>' +
          '<div class="vol-info">' +
            '<div class="vol-name">' + esc(t.name) + '</div>' +
            '<div class="vol-code">' + esc(t.ticker) + '</div>' +
          '</div>' +
          '<div class="vol-right">' +
            '<span class="vol-pct ' + pctClass + '">' + pctText + '</span>' +
          '</div>' +
        '</div>';
      });
      html += '<div class="sidebar-as-of">S&amp;P 500 대형주 전일 등락률</div>';
      el.innerHTML = html;
    }
  }

  /* ════════════════════════════════════════════
     공통 유틸 & 공개 함수
     ════════════════════════════════════════════ */
  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* 차트 앱 이동 — market 파라미터 정확히 전달 */
  window.goChart = function (sym, mkt) {
    var market = (mkt || '').toUpperCase() === 'US' ? 'US' : 'KR';
    window.location.href = '/app?symbol=' + encodeURIComponent(sym) + '&market=' + market;
  };

  window.goPage = function (p) {
    _page = p;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  window.onSearchInput = function () {
    _query = document.getElementById('news-search').value.trim();
    _page  = 1;
    render();
  };

  /* 탭 이벤트 */
  document.querySelectorAll('.news-tab').forEach(function (btn) {
    btn.addEventListener('click', function () {
      document.querySelectorAll('.news-tab').forEach(function (b) { b.classList.remove('active'); });
      this.classList.add('active');
      _tab  = this.dataset.tab;
      _page = 1;
      render();
    });
  });

  /* ── 초기 로드 ────────────────────────────── */
  _fetchAll();
  _fetchKrVol();
  _fetchUsRates();

})();
</script>

</body>
</html>
