<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>뉴스 — Draw2Trade</title>
  <link rel="icon" type="image/svg+xml" href="/static/img/favicon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:     #0f0f12;
      --bg2:    #18181c;
      --bg3:    #1e1e24;
      --teal:   #26a69a;
      --orange: #ff6b35;
      --red:    #ef5350;
      --blue:   #5b8def;
      --text:   #d4d8e2;
      --muted:  #7a8499;
      --border: #27272a;
    }
    html, body {
      height: 100%; background: var(--bg); color: var(--text);
      font-family: 'Pretendard Variable', 'Pretendard', 'Segoe UI', system-ui, sans-serif;
      font-size: 13px; line-height: 1.5;
    }

    /* ── 네비 ─────────────────────────────────── */
    .d2t-nav {
      position: sticky !important; top: 0 !important; z-index: 100 !important;
      height: 46px !important; background: #18181b !important;
      border-bottom: 1px solid var(--border) !important;
      display: flex !important; align-items: center !important;
      padding: 0 20px !important; gap: 0 !important;
      box-sizing: border-box !important;
    }
    .d2t-brand {
      font-size: 15px !important; font-weight: 800 !important; color: var(--orange) !important;
      text-decoration: none !important; display: flex !important; align-items: center !important;
      gap: 7px !important; white-space: nowrap !important;
      flex-shrink: 0 !important; margin-right: 16px !important;
    }
    .d2t-brand img { height: 22px !important; width: 22px !important; object-fit: contain !important; }
    .d2t-nav-sep {
      width: 1px !important; height: 16px !important; background: #3f3f46 !important;
      flex-shrink: 0 !important; margin: 0 20px 0 0 !important;
    }
    .d2t-nav-tabs {
      display: flex !important; align-items: center !important;
      gap: 30px !important; flex-shrink: 0 !important;
    }
    .nav-spacer { flex: 1 !important; min-width: 0 !important; }
    .nav-link {
      font-size: 14px !important; font-weight: 500 !important;
      color: #6b7280 !important; text-decoration: none !important;
      background: none !important; border: none !important;
      border-top: none !important; border-left: none !important; border-right: none !important;
      border-bottom: 2px solid transparent !important;
      box-shadow: none !important; outline: none !important;
      border-radius: 0 !important;
      padding: 0 !important; margin: 0 !important; white-space: nowrap !important;
      transition: color .15s !important;
      line-height: 46px !important; display: inline-block !important;
      letter-spacing: 0 !important;
    }
    .nav-link:hover {
      color: #d4d8e2 !important; text-decoration: none !important;
      border-bottom-color: #3f3f46 !important;
      background: none !important; box-shadow: none !important;
    }
    .nav-link.active {
      color: #26a69a !important;
      border-bottom: 2px solid #26a69a !important;
      font-weight: 700 !important;
      background: none !important; box-shadow: none !important;
    }

    /* ── 레이아웃 ──────────────────────────────── */
    .page-layout {
      max-width: 1100px; margin: 0 auto;
      display: grid; grid-template-columns: 1fr 300px;
      gap: 28px; padding: 28px 20px 60px;
    }
    @media (max-width: 800px) {
      .page-layout { grid-template-columns: 1fr; }
      .news-sidebar { display: none; }
    }

    /* ── 페이지 헤더 ───────────────────────────── */
    .page-header { margin-bottom: 20px; }
    .page-header h1 { font-size: 20px; font-weight: 800; color: #fff; margin-bottom: 4px; }
    .page-header p  { font-size: 12px; color: var(--muted); }

    /* ── 서브탭 ───────────────────────────────── */
    .news-tabs {
      display: flex; gap: 0; border-bottom: 1px solid var(--border);
      margin-bottom: 16px; overflow-x: auto; scrollbar-width: none;
    }
    .news-tabs::-webkit-scrollbar { display: none; }
    .news-tab {
      flex-shrink: 0; padding: 8px 16px; font-size: 12px; font-weight: 600;
      color: var(--muted); background: none; border: none; border-bottom: 2px solid transparent;
      cursor: pointer; transition: color .15s, border-color .15s; white-space: nowrap;
    }
    .news-tab.active { color: #d4d8e2; border-bottom-color: var(--teal); }
    .news-tab:hover  { color: #a0a8b8; }

    /* ── 검색바 ───────────────────────────────── */
    .news-search-row { display: flex; gap: 8px; margin-bottom: 18px; }
    .news-search-input {
      flex: 1; background: var(--bg3); border: 1px solid var(--border);
      border-radius: 7px; padding: 8px 12px; color: var(--text);
      font-size: 12px; outline: none; transition: border-color .15s;
    }
    .news-search-input:focus { border-color: var(--teal); }
    .news-search-input::placeholder { color: var(--muted); }

    /* ── 뉴스 카드 ────────────────────────────── */
    .news-list { display: flex; flex-direction: column; gap: 0; }
    .news-card {
      display: flex; gap: 14px; padding: 14px 0;
      border-bottom: 1px solid rgba(255,255,255,.05);
      text-decoration: none; color: inherit; transition: background .1s;
      border-radius: 8px;
    }
    .news-card:hover { background: rgba(255,255,255,.025); padding-left: 8px; padding-right: 8px; }

    .news-thumb {
      flex-shrink: 0; width: 80px; height: 62px;
      border-radius: 7px; overflow: hidden;
      background: var(--bg3); display: flex; align-items: center; justify-content: center;
    }
    .news-thumb img { width: 100%; height: 100%; object-fit: cover; }
    /* 폴백: 시장 아이콘 + 미니 캔들 SVG */
    .news-thumb-svg {
      position: relative;
      display: flex; align-items: center; justify-content: center;
      width: 100%; height: 100%;
      background: linear-gradient(135deg, #14141a 0%, #1c1c24 100%);
    }
    .news-thumb-svg svg { width: 56px; height: 36px; }

    /* 파비콘 기반 썸네일 (큰 로고 + 그라데이션 배경) */
    .news-thumb-fav {
      position: relative;
      display: flex; align-items: center; justify-content: center;
      width: 100%; height: 100%;
    }
    .news-thumb-fav img {
      width: 28px; height: 28px;
      filter: drop-shadow(0 1px 3px rgba(0,0,0,.4));
    }

    .news-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 5px; }
    .news-source-row { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
    .news-source-fav {
      display: inline-block; width: 14px; height: 14px;
      border-radius: 2px; flex-shrink: 0; vertical-align: middle;
      object-fit: contain;
    }
    .news-source {
      font-size: 10px; font-weight: 700; color: #26a69a;
      letter-spacing: 0.03em;
    }
    .news-market-badge {
      font-size: 9px; font-weight: 700; padding: 1px 5px;
      border-radius: 3px; letter-spacing: 0.3px;
    }
    .badge-kr { background: rgba(38,166,154,.15); color: var(--teal); }
    .badge-us { background: rgba(91,141,239,.15); color: var(--blue); }

    .news-title {
      font-size: 13px; font-weight: 600; color: #d4d8e2; line-height: 1.45;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .news-card:hover .news-title { color: #4dd0c4; }

    /* 인기 탭 랭킹 배지 */
    .news-rank-badge {
      flex-shrink: 0; width: 24px; height: 24px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 800; color: var(--teal);
      background: rgba(38,166,154,.1); border-radius: 6px;
      font-family: 'JetBrains Mono', monospace; align-self: center;
    }

    .news-meta-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-top: 2px; }
    .news-time { font-size: 10px; color: var(--muted); }

    /* 종목 배지 — 배경·테두리 없음, 순수 텍스트 컬러 포인트 */
    .news-stock-chips { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-top: 1px; }
    .news-chip {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11px; padding: 0;
      cursor: pointer; transition: opacity .15s;
      border: none !important; background: none !important;
      font-weight: 600; letter-spacing: 0.1px; line-height: 1;
    }
    .news-chip:hover { opacity: 0.7; }
    /* 종목명 */
    .chip-name { color: #a0a8b8; }
    /* 등락률 숫자 — 색상만 */
    .chip-rate { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 700; }
    .chip-up   .chip-name { color: #c9a0a0; }
    .chip-up   .chip-rate { color: #ef5350; }
    .chip-down .chip-name { color: #90b3b0; }
    .chip-down .chip-rate { color: #26a69a; }
    .chip-flat .chip-name { color: #71717a; }
    .chip-flat .chip-rate { color: #555; }
    /* 구분 점 */
    .chip-dot {
      color: #3f3f46; font-size: 8px; align-self: center;
      margin: 0 2px; user-select: none;
    }

    /* ── 로딩/빈 상태 ────────────────────────── */
    .news-empty {
      text-align: center; padding: 60px 20px;
      color: var(--muted); font-size: 14px;
    }
    .news-spinner {
      width: 28px; height: 28px; margin: 0 auto 12px;
      border: 2px solid rgba(255,255,255,.08);
      border-top-color: var(--teal);
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 페이지네이션 ─────────────────────────── */
    .news-pagination {
      display: flex; justify-content: center; gap: 6px;
      margin-top: 24px; flex-wrap: wrap;
    }
    .page-btn {
      width: 32px; height: 32px; border-radius: 6px; border: 1px solid var(--border);
      background: none; color: var(--muted); font-size: 12px; cursor: pointer;
      transition: all .15s;
    }
    .page-btn:hover, .page-btn.active {
      border-color: var(--teal); color: var(--teal); background: rgba(38,166,154,.08);
    }

    /* ── 사이드바 ─────────────────────────────── */
    .news-sidebar { display: flex; flex-direction: column; gap: 16px; }
    .sidebar-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 10px; overflow: hidden;
    }
    .sidebar-card-head {
      padding: 12px 14px 0;
    }
    .sidebar-head-row {
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
    }
    .sidebar-card-title {
      font-size: 11px; font-weight: 700; color: var(--muted);
      letter-spacing: .8px; text-transform: uppercase; margin-bottom: 2px;
    }
    .sidebar-cat-select {
      font-size: 10px; font-weight: 600; color: var(--teal);
      background: rgba(38,166,154,.08); border: 1px solid rgba(38,166,154,.2);
      border-radius: 5px; padding: 3px 8px; cursor: pointer;
      outline: none; appearance: auto;
    }
    .sidebar-cat-select:hover { border-color: var(--teal); }
    .sidebar-cat-select option { background: var(--bg2); color: var(--text); }
    .sidebar-card-sub {
      font-size: 10px; color: #52525b; margin-bottom: 10px;
    }
    /* 사이드바 KR/US 탭 */
    .sidebar-tabs {
      display: flex; border-bottom: 1px solid var(--border);
      margin: 0;
    }
    .sidebar-tab {
      flex: 1; padding: 7px 0; font-size: 11px; font-weight: 700;
      color: var(--muted); background: none; border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer; transition: color .15s, border-color .15s;
      text-align: center;
    }
    .sidebar-tab.active { color: #d4d8e2; border-bottom-color: var(--teal); }
    .sidebar-tab:hover  { color: #a0a8b8; }

    .sidebar-body { padding: 4px 0 8px; }

    /* 전일 거래대금 순위 행 */
    .vol-row {
      position: relative;
      display: flex; align-items: center;
      padding: 7px 14px; cursor: pointer;
      transition: background .1s; overflow: hidden;
    }
    .vol-row:hover { background: rgba(255,255,255,.03); }

    /* Progress Bar — 거래량 비율 배경 */
    .vol-bar {
      position: absolute; left: 0; top: 0; bottom: 0;
      background: rgba(38,166,154,.06);
      transition: width .4s cubic-bezier(.4,0,.2,1);
      pointer-events: none; z-index: 0;
      border-right: 1px solid rgba(38,166,154,.12);
    }
    .vol-row > * { position: relative; z-index: 1; }

    .vol-rank {
      font-size: 10px; font-weight: 700; color: #52525b;
      width: 18px; flex-shrink: 0; text-align: right; margin-right: 10px;
    }
    .vol-rank.top3      { color: var(--teal); }
    .vol-rank.top3-rise { color: #ef5350; }
    .vol-rank.top3-fall { color: #5b8def; }
    .vol-info { flex: 1; min-width: 0; }
    .vol-name {
      font-size: 12px; font-weight: 600; color: #d4d8e2;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .vol-code { font-size: 10px; color: var(--muted); margin-top: 1px; }
    .vol-right { display: flex; flex-direction: column; align-items: flex-end; flex-shrink: 0; margin-left: 8px; gap: 2px; }
    .vol-pct {
      font-size: 12px; font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
    }
    .pct-up   { color: #ef5350; }
    .pct-down { color: var(--teal); }
    .pct-flat { color: #555; }
    .vol-amt  { font-size: 9px; color: #52525b; font-family: 'JetBrains Mono', monospace; }

    /* 사이드바 기준 텍스트 */
    .sidebar-as-of {
      font-size: 10px; color: #3f3f46;
      padding: 8px 14px 4px; text-align: right;
      border-top: 1px solid rgba(255,255,255,.03);
    }

    /* 빠른 이동 */
    .quick-links { padding: 12px 14px; display: flex; flex-direction: column; gap: 6px; }
    .quick-link {
      font-size: 12px; color: var(--muted); text-decoration: none;
      padding: 6px 8px; background: var(--bg3); border-radius: 6px;
      transition: color .15s, background .15s;
    }
    .quick-link:hover { color: var(--teal); background: rgba(38,166,154,.07); }
    .quick-link.primary { color: var(--teal); background: rgba(38,166,154,.07); }

    /* ── 새 뉴스 slide-in 애니메이션 ─────────────── */
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .news-card-new {
      opacity: 0;
      transform: translateY(-14px);
    }
    .news-card-new-show {
      animation: slideDown .35s cubic-bezier(.4,0,.2,1) forwards;
    }

    footer {
      padding: 32px 20px; text-align: center; color: var(--muted); font-size: 11px;
      border-top: 1px solid var(--border); max-width: 1100px; margin: 0 auto;
    }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--teal); }
  </style>

</head>

<!-- ── 네비게이션 ──────────────────────────────────────── -->
<nav class="d2t-nav">
  <a href="/" class="d2t-brand">
    <img src="/static/img/logo.png" alt="Draw2Trade" onerror="this.src='/static/img/favicon.svg'">
    Draw2Trade
  </a>
  <span class="d2t-nav-sep"></span>
  <div class="d2t-nav-tabs">
    <a href="/news"    class="nav-link active">뉴스</a>

<!-- ── 메인 콘텐츠 ────────────────────────────────────── -->
<div class="page-layout">

  <!-- ── 좌측: 뉴스 피드 ───────────────────────────── -->
  <div class="news-main">
    <div class="page-header">
      <h1>시장 뉴스</h1>
      <p>국내·해외 주요 종목 뉴스를 확인하세요.</p>
    </div>

    <!-- 서브탭 -->
    <div class="news-tabs" id="news-tabs">
      <button class="news-tab active" data-tab="all">전체</button>
      <button class="news-tab" data-tab="kr">국내 (KR)</button>
      <button class="news-tab" data-tab="us">해외 (US)</button>
      <button class="news-tab" data-tab="hot">인기</button>
    </div>

    <!-- 검색 -->
    <div class="news-search-row">
      <input class="news-search-input" id="news-search" type="text"
             placeholder="종목명 또는 키워드 검색…" oninput="onSearchInput()">
    </div>

    <!-- 뉴스 목록 -->
    <div class="news-list" id="news-list">
      <div class="news-empty"><div class="news-spinner"></div>뉴스를 불러오는 중입니다…</div>
    </div>

    <div class="news-pagination" id="news-pagination"></div>
  </div>

  <!-- ── 우측: 사이드바 ─────────────────────────────── -->
  <aside class="news-sidebar">

    <!-- 종목 순위 TOP 10 -->
    <div class="sidebar-card">
      <div class="sidebar-card-head">
        <div class="sidebar-head-row">
          <div class="sidebar-card-title">TOP 10</div>
          <select class="sidebar-cat-select" id="sidebar-cat" onchange="switchSidebarCat(this.value)">
            <option value="volume" selected>거래대금</option>
            <option value="rise">상승률</option>
            <option value="fall">하락률</option>
            <option value="vol">거래량</option>
          </select>
        </div>
        <div class="sidebar-card-sub" id="sidebar-asof-label">전일 종가 기준</div>
      </div>
      <div class="sidebar-tabs">
        <button class="sidebar-tab active" data-mkt="kr" onclick="switchSidebarTab('kr')">국내 KR</button>
        <button class="sidebar-tab"        data-mkt="us" onclick="switchSidebarTab('us')">해외 US</button>
      </div>
      <div class="sidebar-body" id="sidebar-vol-list">
        <div class="news-empty" style="padding:24px 0;font-size:12px;"><div class="news-spinner"></div>로딩 중…</div>
      </div>
    </div>

    <!-- 빠른 이동 -->
    <div class="sidebar-card">
      <div class="sidebar-card-head">
        <div class="sidebar-card-title" style="margin-bottom:0;">바로가기</div>
      </div>
      <div class="quick-links">
        <a href="/app"     class="quick-link primary">차트 앱으로 →</a>
        <a href="/feed"    class="quick-link">시장 피드</a>
        <a href="/notices" class="quick-link">공지사항</a>
      </div>
    </div>

  </aside>
</div>

<script>
(function () {
  'use strict';

  /* ════════════════════════════════════════════
     뉴스 피드
     ════════════════════════════════════════════ */
  var _tab     = 'all';
  var _query   = '';
  var _page    = 1;
  var _perPage = 15;
  var _allItems = [];
  var _krItems  = [];
  var _usItems  = [];

  // 전일 등락률 캐시 { ticker: rate_string }
  var _rateCache = {};

  /* KR 종목 코드 → 표시명 */
  var _KR_NAME = {
    '005930': '삼성전자', '000660': 'SK하이닉스', '035420': 'NAVER',
    '035720': '카카오',   '005380': '현대차',     '051910': 'LG화학',
    '006400': '삼성SDI',  '028260': '삼성물산',   '105560': 'KB금융',
    '055550': '신한지주',
  };

  /* KR: 섹터별 대표 종목 (삼성 편중 해소) */
  var _KR_SYMBOLS = Object.keys(_KR_NAME);

  /* US: S&P 500 대형주 */
  var _US_SYMBOLS = ['AAPL', 'NVDA', 'TSLA', 'META', 'GOOGL', 'MSFT', 'AMZN', 'JPM'];

  /* ── KR 이름 → 코드 역방향 맵 (멀티 종목 추출용) ── */
  var _KR_NAME_TO_CODE = {};
  Object.keys(_KR_NAME).forEach(function (code) {
    _KR_NAME_TO_CODE[_KR_NAME[code]] = code;
  });

  /* ── 뉴스 제목에서 종목 추출 ─────────────────────
     - KR: _KR_NAME 키워드 매칭
     - US: 심볼 대문자 패턴 매칭
  ──────────────────────────────────────────────── */
  function _extractSymbols(title, primarySym, market) {
    var found = {};
    if (market === 'KR') {
      Object.keys(_KR_NAME_TO_CODE).forEach(function (name) {
        if (title.indexOf(name) !== -1) found[_KR_NAME_TO_CODE[name]] = true;
      });
    }
    // 주 종목은 항상 포함
    if (primarySym) found[primarySym] = true;
    return Object.keys(found);
  }

  /* ── 중복 제거 ─────────────────────────────────
     1) URL 완전 일치
     2) 제목 앞 40자 일치
     3) 제목 핵심어(공백/특수문자 제거 후) 앞 30자 일치
  ────────────────────────────────────────────── */
  function _normalizeTitle(t) {
    return (t || '').replace(/[\s\[\]【】「」『』<>()（）,.·…!?！？]/g, '').toLowerCase();
  }
  function _dedupe(arr) {
    var seenUrl   = {};
    var seenTitle = {};
    var seenNorm  = {};
    return arr.filter(function (it) {
      var urlKey   = (it.url   || '').trim();
      var titleKey = (it.title || '').trim().slice(0, 40);
      var normKey  = _normalizeTitle(it.title).slice(0, 30);
      if (urlKey && seenUrl[urlKey])  return false;
      if (seenTitle[titleKey])        return false;
      if (normKey && seenNorm[normKey]) return false;
      if (urlKey) seenUrl[urlKey]   = true;
      seenTitle[titleKey] = true;
      if (normKey) seenNorm[normKey] = true;
      return true;
    });
  }

  /* ── 뉴스 fetch ─────────────────────────────── */
  var _seenUrls = {};   // 폴링 시 이미 본 URL 추적

  function _fetchAll(isPolling) {
    if (!isPolling) setLoading();
    var allSyms = _KR_SYMBOLS.concat(_US_SYMBOLS);
    var fetches = allSyms.map(function (sym) {
      return fetch('/api/v1/stock/news/' + encodeURIComponent(sym))
        .then(function (r) { return r.ok ? r.json() : null; })
        .catch(function () { return null; });
    });
    Promise.all(fetches).then(function (results) {
      var krRaw = [], usRaw = [];
      results.forEach(function (d, i) {
        if (!d || !d.items || !d.items.length) return;
        var isUs = i >= _KR_SYMBOLS.length;
        var sym  = allSyms[i];
        /* 종목의 최신 1개만 */
        var best = d.items.slice().sort(function (a, b) {
          return _parseDate(b.date) - _parseDate(a.date);
        })[0];
        var entry = Object.assign({}, best, {
          _symbol:  sym,
          _market:  isUs ? 'US' : 'KR',
          _symbols: _extractSymbols(best.title || '', sym, isUs ? 'US' : 'KR'),
          _score:   best.score || 0,
        });
        if (isUs) usRaw.push(entry); else krRaw.push(entry);
      });

      var newKr  = _dedupe(krRaw).sort(function (a, b) { return _parseDate(b.date) - _parseDate(a.date); });
      var newUs  = _dedupe(usRaw).sort(function (a, b) { return _parseDate(b.date) - _parseDate(a.date); });
      var newAll = _dedupe(newKr.concat(newUs)).sort(function (a, b) {
        return _parseDate(b.date) - _parseDate(a.date);
      });

      if (isPolling) {
        /* 폴링: 새 뉴스만 prepend */
        var fresh = newAll.filter(function (it) {
          var key = it.url || it.title;
          return key && !_seenUrls[key];
        });
        if (fresh.length) {
          fresh.forEach(function (it) { _seenUrls[it.url || it.title] = true; });
          _krItems  = _dedupe(fresh.filter(function (it) { return it._market === 'KR'; }).concat(_krItems));
          _usItems  = _dedupe(fresh.filter(function (it) { return it._market === 'US'; }).concat(_usItems));
          _allItems = _dedupe(fresh.concat(_allItems));
          if (_page === 1) _prependCards(fresh);
        }
      } else {
        /* 초기 로드 */
        _krItems  = newKr;
        _usItems  = newUs;
        _allItems = newAll;
        _allItems.forEach(function (it) { _seenUrls[it.url || it.title] = true; });
        _page = 1;
        render();
      }
    });
  }

  function _parseDate(s) {
    if (!s) return 0;
    var m = s.match(/(\d{4})[.\-\/](\d{2})[.\-\/](\d{2})/);
    if (!m) return 0;
    return new Date(m[1] + '-' + m[2] + '-' + m[3]).getTime();
  }

  /* ── 새 카드 slide-in prepend ─────────────────── */
  function _prependCards(items) {
    if (_tab !== 'all' && _tab !== 'kr') return; // 현재 탭이 관련 없으면 skip
    var listEl = document.getElementById('news-list');
    var placeholder = listEl.querySelector('.news-empty');
    if (placeholder) { listEl.innerHTML = ''; }
    items.forEach(function (it) {
      var div = document.createElement('div');
      div.innerHTML = renderCard(it);
      var card = div.firstChild;
      card.classList.add('news-card-new');
      listEl.insertBefore(card, listEl.firstChild);
      /* 애니메이션 트리거 */
      requestAnimationFrame(function () { card.classList.add('news-card-new-show'); });
    });
  }

  /* ── 등락률 캐시 갱신 (_krVolData 로드 후 호출) ── */
  function _syncRateFromVol() {
    var volData = _krScannerData['volume'];
    if (!volData) return;
    volData.forEach(function (item) {
      if (item.ticker && item.change_rate != null) {
        _rateCache[item.ticker] = item.change_rate;
      }
    });
  }

  /* ── 렌더 ───────────────────────────────────── */
  function getFiltered() {
    var src = _tab === 'kr'  ? _krItems
            : _tab === 'us'  ? _usItems
            : _tab === 'hot' ? _allItems.slice().sort(function (a, b) {
                // 스코어(관련도) 내림차순 → 날짜 최신순
                var sa = a._score || 0, sb = b._score || 0;
                if (sb !== sa) return sb - sa;
                return _parseDate(b.date) - _parseDate(a.date);
              })
            : _allItems;
    if (_query) {
      var q = _query.toLowerCase();
      src = src.filter(function (it) {
        return (it.title || '').toLowerCase().includes(q) ||
               (it._symbol || '').toLowerCase().includes(q);
      });
    }
    return src;
  }

  function render() {
    var items      = getFiltered();
    var total      = items.length;
    var totalPages = Math.max(1, Math.ceil(total / _perPage));
    if (_page > totalPages) _page = totalPages;
    var sliced = items.slice((_page - 1) * _perPage, _page * _perPage);

    // 사이드바 거래량 데이터에서 등락률 동기화
    _syncRateFromVol();

    var listEl = document.getElementById('news-list');
    if (!sliced.length) {
      listEl.innerHTML = '<div class="news-empty">표시할 뉴스가 없습니다.</div>';
      document.getElementById('news-pagination').innerHTML = '';
      return;
    }
    var startIdx = (_page - 1) * _perPage;
    listEl.innerHTML = sliced.map(function (it, i) {
      return renderCard(it, _tab === 'hot' ? startIdx + i + 1 : 0);
    }).join('');
    renderPagination(totalPages);
  }

  /* ── 섹터별 종목 아이콘 매핑 ──────────────────────
     종목 코드 → 심볼(약어) + 색상 + 섹터
  ────────────────────────────────────────────────── */
  var _ICON_MAP = {
    /* KR */
    '005930': { label: 'SEC',  color: '#1e88e5', bg: '#0a1929' },  /* 삼성전자 */
    '000660': { label: 'SKH',  color: '#7b1fa2', bg: '#1a0a25' },  /* SK하이닉스 */
    '035420': { label: 'NVR',  color: '#43a047', bg: '#071a08' },  /* NAVER */
    '035720': { label: 'KKO',  color: '#f9a825', bg: '#1a1400' },  /* 카카오 */
    '005380': { label: 'HMC',  color: '#e53935', bg: '#1a0505' },  /* 현대차 */
    '051910': { label: 'LGC',  color: '#c0ca33', bg: '#171a00' },  /* LG화학 */
    '006400': { label: 'SDI',  color: '#00acc1', bg: '#001a1d' },  /* 삼성SDI */
    '028260': { label: 'SCT',  color: '#fb8c00', bg: '#1a0d00' },  /* 삼성물산 */
    '105560': { label: 'KBF',  color: '#26a69a', bg: '#001a18' },  /* KB금융 */
    '055550': { label: 'SHF',  color: '#5c6bc0', bg: '#080a1a' },  /* 신한지주 */
    /* US */
    'AAPL':  { label: 'AAPL', color: '#90caf9', bg: '#051525' },
    'NVDA':  { label: 'NVDA', color: '#76ff03', bg: '#0d1a00' },
    'TSLA':  { label: 'TSLA', color: '#ef5350', bg: '#1a0404' },
    'META':  { label: 'META', color: '#5b8def', bg: '#051025' },
    'GOOGL': { label: 'GOOG', color: '#fbbc04', bg: '#1a1300' },
    'MSFT':  { label: 'MSFT', color: '#2196f3', bg: '#051525' },
    'AMZN':  { label: 'AMZN', color: '#ff9800', bg: '#1a0d00' },
    'JPM':   { label: 'JPM',  color: '#26a69a', bg: '#001a18' },
    'AMD':   { label: 'AMD',  color: '#e91e63', bg: '#1a0510' },
    'NFLX':  { label: 'NFLX', color: '#ef5350', bg: '#1a0404' },
  };

  /* ── 썸네일 폴백 — 종목 심볼 레터마크 ────────────────
     고품질 섹터 아이콘: 종목 약어 + 색상 배경 + 캔들 미니차트
  ─────────────────────────────────────────────────── */
  function _makeFallback(mkt, sym) {
    var ico    = (sym && _ICON_MAP[sym]) || null;
    var accent = ico ? ico.color : (mkt === 'US' ? '#5b8def' : '#26a69a');
    var bgCol  = ico ? ico.bg    : '#14141a';
    var label  = ico ? ico.label : (mkt === 'US' ? 'US' : 'KR');
    var accent2 = '#ef5350';
    var mktTag  = mkt === 'US' ? 'NASDAQ' : 'KRX';

    return '<div class="news-thumb-svg" style="background:linear-gradient(145deg,' + bgCol + ' 0%,#1c1c24 100%);">' +
      /* 시장 태그 (우하단) */
      '<div style="position:absolute;bottom:4px;right:5px;font-size:7px;font-weight:700;' +
        'color:' + accent + ';opacity:0.4;font-family:monospace;letter-spacing:.5px;">' + mktTag + '</div>' +
      /* 종목 레터마크 (중앙) */
      '<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)' +
        ';display:flex;flex-direction:column;align-items:center;gap:2px;">' +
        '<div style="font-size:13px;font-weight:900;color:' + accent +
          ';font-family:\'JetBrains Mono\',monospace;letter-spacing:-0.5px;opacity:0.9;">' + label + '</div>' +
      '</div>' +
      /* 미니 캔들 차트 (하단) */
      '<svg style="position:absolute;bottom:6px;left:50%;transform:translateX(-50%);" ' +
        'width="52" height="18" viewBox="0 0 52 18" fill="none">' +
        '<line x1="6"  y1="1" x2="6"  y2="17" stroke="' + accent  + '" stroke-width=".8" opacity=".15"/>' +
        '<rect x="3"  y="5" width="6" height="7" rx=".8" fill="' + accent  + '" opacity=".35"/>' +
        '<line x1="15" y1="2" x2="15" y2="16" stroke="' + accent2 + '" stroke-width=".8" opacity=".15"/>' +
        '<rect x="12" y="7" width="6" height="7" rx=".8" fill="' + accent2 + '" opacity=".35"/>' +
        '<line x1="24" y1="1" x2="24" y2="13" stroke="' + accent2 + '" stroke-width=".8" opacity=".15"/>' +
        '<rect x="21" y="3" width="6" height="8" rx=".8" fill="' + accent2 + '" opacity=".45"/>' +
        '<line x1="33" y1="3" x2="33" y2="15" stroke="' + accent  + '" stroke-width=".8" opacity=".15"/>' +
        '<rect x="30" y="6" width="6" height="6" rx=".8" fill="' + accent  + '" opacity=".35"/>' +
        '<line x1="42" y1="1" x2="42" y2="12" stroke="' + accent2 + '" stroke-width=".8" opacity=".15"/>' +
        '<rect x="39" y="3" width="6" height="7" rx=".8" fill="' + accent2 + '" opacity=".4"/>' +
        '<polyline points="6,9 15,10 24,6 33,9 42,5" stroke="' + accent + '" stroke-width=".8" opacity=".25" fill="none" stroke-dasharray="1.5,1.5"/>' +
      '</svg>' +
    '</div>';
  }

  /* ── URL → 핵심 도메인 대문자 추출 ─────────────── */
  function _newsDomain(url) {
    if (!url) return '';
    try {
      var host = url.replace(/^https?:\/\//i, '').split('/')[0].toLowerCase();
      if (host.startsWith('www.')) host = host.slice(4);
      var subs = ['news.','m.','n.','finance.','biz.','sports.','global.','economy.',
                  'stock.','weekly.','it.','moneys.','biznews.'];
      for (var i = 0; i < subs.length; i++) {
        if (host.startsWith(subs[i])) { host = host.slice(subs[i].length); break; }
      }
      var parts = host.split('.');
      var label;
      if (parts.length >= 3 && parts[parts.length-1] === 'kr' &&
          ['co','or','go','ne'].indexOf(parts[parts.length-2]) !== -1) {
        label = parts[parts.length-3];
      } else {
        label = parts.length >= 2 ? parts[parts.length-2] : parts[0];
      }
      return label ? label.toUpperCase() : '';
    } catch(e) { return ''; }
  }

  /* ── Google S2 파비콘 URL 생성 ─────────────────── */
  function _faviconUrl(newsUrl) {
    if (!newsUrl) return '';
    var m = newsUrl.match(/^(https?:\/\/[^\/]+)/i);
    return m ? 'https://www.google.com/s2/favicons?domain=' + encodeURIComponent(m[1]) + '&sz=32' : '';
  }

  function renderCard(it, rank) {
    var title  = esc(it.title || '');
    var date   = esc(it.date || '');
    var url    = it.url || '#';
    var sym    = it._symbol || '';
    var mkt    = it._market || 'KR';
    var rankBadge = rank ? '<span class="news-rank-badge">' + rank + '</span>' : '';

    /* ── 썸네일: 파비콘 크게 + 레터마크 조합 ─────── */
    var origUrl = it.orig_url || it.url || '';
    var favUrl  = _faviconUrl(origUrl);
    var fallback = _makeFallback(mkt, sym);
    var thumbHtml;
    if (favUrl) {
      var fbEsc = fallback.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      thumbHtml = '<div class="news-thumb-fav" style="background:linear-gradient(145deg,#14141a 0%,#1c1c24 100%);">' +
        '<img src="' + esc(favUrl) + '" alt="" width="28" height="28" loading="lazy" ' +
          'style="border-radius:4px;image-rendering:auto;" ' +
          'onerror="this.parentNode.parentNode.innerHTML=\'' + fbEsc + '\'">' +
        '</div>';
    } else {
      thumbHtml = fallback;
    }

    /* ── 출처: [파비콘16] DOMAIN 대문자 ──────────── */
    var domain   = _newsDomain(origUrl);
    var smallFav = favUrl
      ? '<img class="news-source-fav" src="' + esc(favUrl) + '" alt="" width="14" height="14" loading="lazy">'
      : '';
    var sourceHtml = smallFav + (domain ? '<span class="news-source">' + domain + '</span>' : '');

    var mktBadge = mkt === 'US'
      ? '<span class="news-market-badge badge-us">US</span>'
      : '<span class="news-market-badge badge-kr">KR</span>';

    /* 종목 배지 — _symbols 배열 전체 순회, 배경 없는 텍스트 컬러 포인트 */
    var symbols = (it._symbols && it._symbols.length) ? it._symbols : (sym ? [sym] : []);
    var chipParts = [];
    symbols.forEach(function (s, idx) {
      var dispName  = mkt === 'KR' ? (_KR_NAME[s] || s) : s;
      var rate      = _rateCache[s];
      var chipClass = 'chip-flat';
      var rateHtml  = '';
      if (rate != null) {
        var rateNum = parseFloat(rate);
        if (!isNaN(rateNum)) {
          chipClass = rateNum > 0 ? 'chip-up' : rateNum < 0 ? 'chip-down' : 'chip-flat';
          var sign  = rateNum > 0 ? '+' : '';
          rateHtml  = '<span class="chip-rate">' + sign + rateNum.toFixed(2) + '%</span>';
        }
      }
      var dot = idx > 0 ? '<span class="chip-dot">·</span>' : '';
      chipParts.push(
        dot +
        '<span class="news-chip ' + chipClass + '" onclick="event.preventDefault();goChart(\'' +
        esc(s) + '\',\'' + mkt + '\')">' +
        '<span class="chip-name">' + esc(dispName) + '</span>' +
        rateHtml +
        '</span>'
      );
    });
    var chipsHtml = chipParts.length
      ? '<div class="news-stock-chips">' + chipParts.join('') + '</div>'
      : '';

    return '<a class="news-card" href="' + esc(url) + '" target="_blank" rel="noopener">' +
      rankBadge +
      '<div class="news-thumb" style="position:relative;">' + thumbHtml + '</div>' +
      '<div class="news-body">' +
        '<div class="news-source-row">' + sourceHtml + mktBadge + '</div>' +
        '<div class="news-title">' + title + '</div>' +
        '<div class="news-meta-row">' +
          '<span class="news-time">' + date + '</span>' +
        '</div>' +
        chipsHtml +
      '</div>' +
    '</a>';
  }

  function renderPagination(total) {
    var el = document.getElementById('news-pagination');
    if (total <= 1) { el.innerHTML = ''; return; }
    var html = '';
    var start = Math.max(1, _page - 2);
    var end   = Math.min(total, _page + 2);
    if (_page > 1) html += '<button class="page-btn" onclick="goPage(' + (_page - 1) + ')">‹</button>';
    for (var i = start; i <= end; i++) {
      html += '<button class="page-btn' + (i === _page ? ' active' : '') + '" onclick="goPage(' + i + ')">' + i + '</button>';
    }
    if (_page < total) html += '<button class="page-btn" onclick="goPage(' + (_page + 1) + ')">›</button>';
    el.innerHTML = html;
  }

  function setLoading() {
    document.getElementById('news-list').innerHTML =
      '<div class="news-empty"><div class="news-spinner"></div>로딩 중…</div>';
    document.getElementById('news-pagination').innerHTML = '';
  }

  /* ════════════════════════════════════════════
     사이드바 — 전일 거래대금 TOP 10
     ════════════════════════════════════════════ */
  var _sidebarMkt = 'kr';
  var _sidebarCat = 'volume';  // volume | rise | fall | vol

  /* US 고정 대형주 목록 */
  var _US_TOP = [
    { ticker: 'NVDA',  name: 'NVIDIA' },
    { ticker: 'AAPL',  name: 'Apple' },
    { ticker: 'TSLA',  name: 'Tesla' },
    { ticker: 'MSFT',  name: 'Microsoft' },
    { ticker: 'AMZN',  name: 'Amazon' },
    { ticker: 'META',  name: 'Meta' },
    { ticker: 'GOOGL', name: 'Alphabet' },
    { ticker: 'JPM',   name: 'JPMorgan' },
    { ticker: 'AMD',   name: 'AMD' },
    { ticker: 'NFLX',  name: 'Netflix' },
  ];
  var _krScannerData = {};   // { volume: [...], rise: [...], fall: [...], vol: [...] }
  var _usRates   = {};       // ticker → change_rate

  var _CAT_LABELS = {
    volume: '거래대금 TOP 10',
    rise:   '상승률 TOP 10',
    fall:   '하락률 TOP 10',
    vol:    '거래량 TOP 10',
  };
  var _CAT_ASOF = {
    volume: '전일 종가 기준 거래대금 순위',
    rise:   '전일 종가 기준 상승률 순위',
    fall:   '전일 종가 기준 하락률 순위',
    vol:    '전일 종가 기준 거래량 순위',
  };

  function switchSidebarTab(mkt) {
    _sidebarMkt = mkt;
    document.querySelectorAll('.sidebar-tab').forEach(function (b) {
      b.classList.toggle('active', b.dataset.mkt === mkt);
    });
    renderSidebar();
  }
  window.switchSidebarTab = switchSidebarTab;

  function switchSidebarCat(cat) {
    _sidebarCat = cat;
    renderSidebar();
    // 아직 데이터 없으면 fetch
    if (_sidebarMkt === 'kr' && !_krScannerData[cat]) {
      _fetchKrScanner(cat);
    }
  }
  window.switchSidebarCat = switchSidebarCat;

  /* KR 스캐너 fetch — 카테고리별 */
  function _fetchKrScanner(cat) {
    var apiPath;
    if (cat === 'volume') apiPath = '/api/v1/stock/market/scanner/volume?top_n=20';
    else if (cat === 'rise') apiPath = '/api/v1/stock/market/scanner/rise?top_n=20';
    else if (cat === 'fall') apiPath = '/api/v1/stock/market/scanner/fall?top_n=20';
    else if (cat === 'vol') apiPath = '/api/v1/stock/market/scanner/volume?top_n=20';
    else return;

    fetch(apiPath)
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (d) {
        if (d && d.items && d.items.length) {
          _krScannerData[cat] = d.items.slice(0, 10);
          // volume 데이터로 뉴스 배지 등락률 갱신
          if (cat === 'volume') {
            _syncRateFromVol();
            render();
          }
          if (_sidebarMkt === 'kr' && _sidebarCat === cat) renderSidebar();
        }
      })
      .catch(function () {});
  }

  /* US 종목 finance fetch (등락률 수집) */
  function _fetchUsRates() {
    _US_TOP.forEach(function (t) {
      fetch('/api/v1/stock/finance/' + encodeURIComponent(t.ticker))
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (d) {
          if (!d) return;
          var rate = d.change_rate || (d.price_info && d.price_info.change_rate) || null;
          _usRates[t.ticker] = rate || null;
          if (_sidebarMkt === 'us') renderSidebar();
        })
        .catch(function () { _usRates[t.ticker] = null; });
    });
  }

  /* 거래량 → 읽기 좋은 단위 문자열 */
  function _fmtVol(v) {
    if (!v || isNaN(v)) return '';
    if (v >= 1e8) return (v / 1e8).toFixed(1) + '억주';
    if (v >= 1e4) return (v / 1e4).toFixed(0) + '만주';
    return v.toLocaleString() + '주';
  }

  function renderSidebar() {
    var el = document.getElementById('sidebar-vol-list');

    if (_sidebarMkt === 'kr') {
      var data = _krScannerData[_sidebarCat];
      if (!data) {
        el.innerHTML = '<div class="news-empty" style="padding:24px 0;font-size:12px;"><div class="news-spinner"></div>로딩 중…</div>';
        return;
      }
      /* bar 기준값: 거래량 or |등락률| */
      var isFallCat = _sidebarCat === 'fall';
      var isRateCat = _sidebarCat === 'rise' || _sidebarCat === 'fall';
      var maxVal;
      if (isRateCat) {
        maxVal = Math.max.apply(null, data.map(function (d) {
          return Math.abs(parseFloat((d.change_rate || '0').replace('+', '')));
        })) || 1;
      } else {
        maxVal = Math.max.apply(null, data.map(function (d) { return d.volume || 0; })) || 1;
      }

      var html = '';
      data.forEach(function (item, i) {
        var rate      = parseFloat((item.change_rate || '0').replace('+', ''));
        var isUp      = rate > 0, isDown = rate < 0;
        var pctClass  = isUp ? 'pct-up' : isDown ? 'pct-down' : 'pct-flat';
        var pctText   = isNaN(rate) ? '—' : (isUp ? '+' : '') + rate.toFixed(2) + '%';
        var rankClass = i < 3 ? 'vol-rank top3' : 'vol-rank';

        var barPct, barColor, borderColor;
        if (isRateCat) {
          barPct = Math.round((Math.abs(rate) / maxVal) * 100);
          barColor = isFallCat ? 'rgba(91,141,239,.06)' : 'rgba(239,83,80,.06)';
          borderColor = isFallCat ? 'rgba(91,141,239,.15)' : 'rgba(239,83,80,.15)';
        } else {
          barPct = Math.round(((item.volume || 0) / maxVal) * 100);
          barColor = 'rgba(38,166,154,.06)';
          borderColor = 'rgba(38,166,154,.12)';
        }
        var volLabel = _fmtVol(item.volume);

        // 상승률=빨간, 하락률=파란 랭킹 강조
        if (isRateCat && i < 3) {
          rankClass = isFallCat ? 'vol-rank top3-fall' : 'vol-rank top3-rise';
        }

        html += '<div class="vol-row" onclick="goChart(\'' + esc(item.ticker) + '\',\'KR\')">' +
          '<div class="vol-bar" style="width:' + barPct + '%;background:' + barColor + ';border-right-color:' + borderColor + '"></div>' +
          '<span class="' + rankClass + '">' + (i + 1) + '</span>' +
          '<div class="vol-info">' +
            '<div class="vol-name">' + esc(item.name || item.ticker) + '</div>' +
            '<div class="vol-code">' + esc(item.ticker) + '</div>' +
          '</div>' +
          '<div class="vol-right">' +
            '<span class="vol-pct ' + pctClass + '">' + pctText + '</span>' +
            (volLabel ? '<span class="vol-amt">' + volLabel + '</span>' : '') +
          '</div>' +
        '</div>';
      });
      html += '<div class="sidebar-as-of">' + (_CAT_ASOF[_sidebarCat] || '') + '</div>';
      el.innerHTML = html;

    } else {
      var anyLoaded = Object.keys(_usRates).length > 0;
      if (!anyLoaded) {
        el.innerHTML = '<div class="news-empty" style="padding:24px 0;font-size:12px;"><div class="news-spinner"></div>로딩 중…</div>';
        return;
      }
      var maxAbs = Math.max.apply(null,
        _US_TOP.map(function (t) { return Math.abs(parseFloat(_usRates[t.ticker] || '0')); })
      ) || 1;

      var html = '';
      _US_TOP.forEach(function (t, i) {
        var rateRaw  = _usRates[t.ticker];
        var rate     = rateRaw != null ? parseFloat(rateRaw) : NaN;
        var isUp     = !isNaN(rate) && rate > 0;
        var isDown   = !isNaN(rate) && rate < 0;
        var pctClass = isUp ? 'pct-up' : isDown ? 'pct-down' : 'pct-flat';
        var pctText  = isNaN(rate) ? '—' : (isUp ? '+' : '') + rate.toFixed(2) + '%';
        var rankClass = i < 3 ? 'vol-rank top3' : 'vol-rank';
        var barPct   = isNaN(rate) ? 0 : Math.round((Math.abs(rate) / maxAbs) * 100);
        var barColor = isDown ? 'rgba(38,166,154,.06)' : 'rgba(239,83,80,.06)';

        html += '<div class="vol-row" onclick="goChart(\'' + esc(t.ticker) + '\',\'US\')">' +
          '<div class="vol-bar" style="width:' + barPct + '%;background:' + barColor + ';border-right-color:' + (isDown ? 'rgba(38,166,154,.15)' : 'rgba(239,83,80,.15)') + '"></div>' +
          '<span class="' + rankClass + '">' + (i + 1) + '</span>' +
          '<div class="vol-info">' +
            '<div class="vol-name">' + esc(t.name) + '</div>' +
            '<div class="vol-code">' + esc(t.ticker) + '</div>' +
          '</div>' +
          '<div class="vol-right">' +
            '<span class="vol-pct ' + pctClass + '">' + pctText + '</span>' +
          '</div>' +
        '</div>';
      });
      html += '<div class="sidebar-as-of">S&amp;P 500 대형주 전일 등락률</div>';
      el.innerHTML = html;
    }
  }

  /* ════════════════════════════════════════════
     공통 유틸 & 공개 함수
     ════════════════════════════════════════════ */
  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* 차트 앱 이동 — market 파라미터 정확히 전달 */
  window.goChart = function (sym, mkt) {
    var market = (mkt || '').toUpperCase() === 'US' ? 'US' : 'KR';
    window.location.href = '/app?symbol=' + encodeURIComponent(sym) + '&market=' + market;
  };

  window.goPage = function (p) {
    _page = p;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  window.onSearchInput = function () {
    _query = document.getElementById('news-search').value.trim();
    _page  = 1;
    render();
  };

  /* 탭 이벤트 */
  document.querySelectorAll('.news-tab').forEach(function (btn) {
    btn.addEventListener('click', function () {
      document.querySelectorAll('.news-tab').forEach(function (b) { b.classList.remove('active'); });
      this.classList.add('active');
      _tab  = this.dataset.tab;
      _page = 1;
      render();
    });
  });

  /* ── 초기 로드 ────────────────────────────── */
  _fetchAll(false);
  _fetchKrScanner('volume');
  _fetchUsRates();

  /* ── 30초 폴링 ─────────────────────────────── */
  setInterval(function () { _fetchAll(true); }, 30000);

})();
</script>

</body>
</html>
