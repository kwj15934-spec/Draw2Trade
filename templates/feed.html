<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>시장 피드 — Draw2Trade</title>
  <link rel="icon" type="image/svg+xml" href="/static/img/favicon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:     #0f0f12;
      --bg2:    #18181c;
      --bg3:    #1e1e24;
      --teal:   #26a69a;
      --orange: #ff6b35;
      --red:    #ef5350;
      --text:   #d4d8e2;
      --muted:  #7a8499;
      --border: #27272a;
    }
    html, body { min-height: 100%; background: var(--bg); color: var(--text);
      font-family: 'Pretendard Variable', 'Pretendard', 'Segoe UI', system-ui, sans-serif;
      font-size: 13px; line-height: 1.5; }

    /* ── 네비 ─────────────────────────────────── */
    .d2t-nav {
      position: sticky; top: 0; z-index: 100;
      height: 48px; background: #18181b; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 20px; gap: 8px;
    }
    .d2t-brand {
      font-size: 15px; font-weight: 800; color: var(--orange);
      text-decoration: none; display: flex; align-items: center; gap: 7px; white-space: nowrap;
    }
    .d2t-brand img { height: 22px; width: 22px; object-fit: contain; }
    .nav-spacer { flex: 1; }
    .nav-link {
      display: flex; align-items: center; height: 26px; padding: 0 10px;
      font-size: 11px; color: var(--muted); border: 1px solid var(--border);
      border-radius: 5px; text-decoration: none; white-space: nowrap;
      transition: color .15s, border-color .15s;
    }
    .nav-link:hover  { color: #d4d8e2; border-color: var(--teal); }
    .nav-link.active { color: var(--teal); border-color: var(--teal); }

    /* ── 레이아웃 ─────────────────────────────── */
    .page-body {
      max-width: 1080px; margin: 0 auto;
      display: grid; grid-template-columns: 1fr 300px;
      gap: 24px; padding: 28px 20px 60px;
    }
    @media (max-width: 760px) {
      .page-body { grid-template-columns: 1fr; }
      .feed-sidebar { display: none; }
    }

    .page-header { margin-bottom: 20px; }
    .page-header h1 { font-size: 20px; font-weight: 800; color: #fff; margin-bottom: 4px; }
    .page-header p  { font-size: 12px; color: var(--muted); }

    /* ── 피드 탭 ──────────────────────────────── */
    .feed-tabs {
      display: flex; gap: 0; border-bottom: 1px solid var(--border);
      margin-bottom: 20px; overflow-x: auto; scrollbar-width: none;
    }
    .feed-tabs::-webkit-scrollbar { display: none; }
    .feed-tab {
      flex-shrink: 0; padding: 8px 16px; font-size: 12px; font-weight: 600;
      color: var(--muted); background: none; border: none; border-bottom: 2px solid transparent;
      cursor: pointer; transition: color .15s, border-color .15s; white-space: nowrap;
    }
    .feed-tab.active { color: #d4d8e2; border-bottom-color: var(--teal); }
    .feed-tab:hover  { color: #a0a8b8; }

    /* ── 피드 카드 그리드 ─────────────────────── */
    .feed-grid {
      display: flex; flex-direction: column; gap: 12px;
    }

    /* ── 인사이트 카드 (토스 스타일) ────────── */
    .insight-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 12px; padding: 18px 20px;
      transition: border-color .15s, transform .1s;
    }
    .insight-card:hover { border-color: rgba(38,166,154,.4); transform: translateY(-1px); }

    .ic-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 12px; margin-bottom: 10px;
    }
    .ic-category {
      font-size: 10px; font-weight: 700; letter-spacing: .8px;
      text-transform: uppercase; color: var(--teal);
      background: rgba(38,166,154,.1); padding: 2px 7px; border-radius: 4px;
    }
    .ic-time { font-size: 10px; color: var(--muted); white-space: nowrap; }

    .ic-title {
      font-size: 15px; font-weight: 700; color: #fff;
      margin-bottom: 8px; line-height: 1.4;
    }
    .ic-body {
      font-size: 13px; color: var(--muted); line-height: 1.65;
      margin-bottom: 12px;
    }

    /* 수치 하이라이트 행 */
    .ic-stats {
      display: flex; gap: 16px; flex-wrap: wrap;
      padding: 10px 0; border-top: 1px solid rgba(255,255,255,.05);
    }
    .ic-stat { display: flex; flex-direction: column; gap: 2px; }
    .ic-stat-label { font-size: 10px; color: var(--muted); }
    .ic-stat-value {
      font-size: 14px; font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
    }
    .val-up   { color: #ef5350; }
    .val-down { color: var(--teal); }
    .val-flat { color: #d4d8e2; }

    /* 종목 태그 */
    .ic-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
    .ic-tag {
      font-size: 10px; padding: 3px 8px; border-radius: 5px;
      background: var(--bg3); color: var(--muted); border: 1px solid var(--border);
      cursor: pointer; transition: color .15s, border-color .15s;
    }
    .ic-tag:hover { color: var(--teal); border-color: var(--teal); }

    /* ── 지수 카드 (큰 배너) ────────────────── */
    .index-banner {
      background: linear-gradient(135deg, #1a1f2e 0%, #18181c 100%);
      border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px;
      display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 14px;
    }
    .idx-item { display: flex; flex-direction: column; gap: 4px; }
    .idx-name { font-size: 10px; color: var(--muted); font-weight: 700; letter-spacing: .5px; }
    .idx-val  { font-size: 18px; font-weight: 800; font-family: 'JetBrains Mono', monospace; color: #fff; }
    .idx-chg  { font-size: 11px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
    .chg-up   { color: #ef5350; }
    .chg-down { color: var(--teal); }

    /* ── 로딩 / 빈 상태 ──────────────────────── */
    .feed-loading, .feed-empty {
      text-align: center; padding: 80px 20px; color: var(--muted); font-size: 14px;
      line-height: 1.8;
    }
    .feed-spinner {
      width: 28px; height: 28px; margin: 0 auto 12px;
      border: 2px solid rgba(255,255,255,.08); border-top-color: var(--teal);
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 사이드바 ─────────────────────────────── */
    .feed-sidebar { display: flex; flex-direction: column; gap: 16px; }

    .sidebar-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 10px; padding: 16px;
    }
    .sidebar-card-title {
      font-size: 11px; font-weight: 700; color: var(--muted);
      letter-spacing: .8px; text-transform: uppercase; margin-bottom: 12px;
    }

    /* 종목 스크리너 */
    .screener-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,.04); cursor: pointer;
    }
    .screener-row:last-child { border-bottom: none; }
    .screener-row:hover .sc-name { color: var(--teal); }
    .sc-name  { font-size: 12px; color: #d4d8e2; font-weight: 600; }
    .sc-code  { font-size: 10px; color: var(--muted); }
    .sc-pct   { font-size: 12px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }


    footer {
      padding: 32px 20px; text-align: center; color: var(--muted); font-size: 11px;
      border-top: 1px solid var(--border); max-width: 1080px; margin: 0 auto;
    }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--teal); }
  </style>
  <link rel="preconnect" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<nav class="d2t-nav">
  <a href="/" class="d2t-brand">
    <img src="/static/img/logo.png" alt="Draw2Trade" onerror="this.src='/static/img/favicon.svg'">
    Draw2Trade
  </a>
  <div class="nav-spacer"></div>
  <a href="/news"    class="nav-link">📰 뉴스</a>
  <a href="/feed"    class="nav-link active">📊 피드</a>
  <a href="/notices" class="nav-link">📢 공지</a>
  <a href="/app"     class="nav-link">차트 앱 →</a>
</nav>

<div class="page-body">

  <!-- ── 메인 피드 ──────────────────────────── -->
  <div class="feed-main">
    <div class="page-header">
      <h1>시장 피드</h1>
      <p>국내외 시장 지표·인사이트·이슈를 한눈에 확인하세요.</p>
    </div>

    <!-- 피드 콘텐츠 -->
    <div class="feed-grid" id="feed-grid">
      <div class="feed-empty">
        <div style="font-size:32px;margin-bottom:12px;">📭</div>
        아직 게시된 피드가 없습니다.<br>
        <span style="font-size:11px;color:#4a5568;margin-top:6px;display:block;">곧 업데이트될 예정입니다.</span>
      </div>
    </div>
  </div>

  <!-- ── 사이드바 ───────────────────────────── -->
  <aside class="feed-sidebar">

    <div class="sidebar-card">
      <div class="sidebar-card-title">급등 종목</div>
      <div id="screener-up"></div>
    </div>

    <div class="sidebar-card">
      <div class="sidebar-card-title">급락 종목</div>
      <div id="screener-down"></div>
    </div>

    <div class="sidebar-card">
      <div class="sidebar-card-title">빠른 이동</div>
      <div style="display:flex;flex-direction:column;gap:6px;">
        <a href="/app"     style="font-size:12px;color:var(--teal);text-decoration:none;padding:6px 8px;background:rgba(38,166,154,.07);border-radius:6px;">📈 차트 앱으로</a>
        <a href="/news"    style="font-size:12px;color:var(--muted);text-decoration:none;padding:6px 8px;background:var(--bg3);border-radius:6px;">📰 시장 뉴스</a>
        <a href="/notices" style="font-size:12px;color:var(--muted);text-decoration:none;padding:6px 8px;background:var(--bg3);border-radius:6px;">📢 공지사항</a>
      </div>
    </div>

  </aside>
</div>

<footer>
  <p style="margin-bottom:6px;">
    &copy; 2026 Draw2Trade &nbsp;·&nbsp;
    <a href="/terms">이용약관</a> &nbsp;·&nbsp;
    <a href="/privacy">개인정보 처리방침</a>
  </p>
  <p>상호: FORMETA &nbsp;|&nbsp; 대표: 김원준 &nbsp;|&nbsp; 사업자: 536-32-01566</p>
</footer>

<script>
(function () {
  'use strict';

  /* ── 스크리너 렌더 ──────────────────────── */
  function renderScreener(elId, items, dir) {
    var el = document.getElementById(elId);
    if (!el) return;
    if (!items || !items.length) {
      el.innerHTML = '<div style="font-size:12px;color:var(--muted);padding:8px 0;">데이터 없음</div>';
      return;
    }
    el.innerHTML = items.map(function (it) {
      var pct   = it.chg_rate != null ? it.chg_rate : 0;
      var cls   = pct >= 0 ? 'pct-up' : 'pct-down';
      var sign  = pct >= 0 ? '+' : '';
      return '<div class="screener-row" onclick="goChart(\'' + esc(it.symbol||it.code||'') + '\',\'KR\')">' +
        '<div>' +
          '<div class="sc-name">' + esc(it.name||it.symbol||'') + '</div>' +
          '<div class="sc-code">' + esc(it.symbol||it.code||'') + '</div>' +
        '</div>' +
        '<span class="sc-pct ' + cls + '">' + sign + pct.toFixed(2) + '%</span>' +
      '</div>';
    }).join('');
  }

  /* ── 사이드바 스크리너 fetch ─────────────── */
  function loadSidebarScreener() {
    fetch('/api/v1/stock/market/scanner/change-rate?market=KR&limit=20')
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (d) {
        var items = (d && d.items) || [];
        var up   = items.filter(function (i) { return (i.chg_rate||0) > 0; })
                        .sort(function (a,b) { return b.chg_rate - a.chg_rate; }).slice(0, 5);
        var down = items.filter(function (i) { return (i.chg_rate||0) < 0; })
                        .sort(function (a,b) { return a.chg_rate - b.chg_rate; }).slice(0, 5);
        renderScreener('screener-up',   up,   'up');
        renderScreener('screener-down', down, 'down');
      })
      .catch(function () {
        renderScreener('screener-up',   [], 'up');
        renderScreener('screener-down', [], 'down');
      });
  }

  /* ── 유틸 ───────────────────────────────── */
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  window.goChart = function (sym, mkt) {
    if (!sym) return;
    window.location.href = '/app?symbol=' + encodeURIComponent(sym) + '&market=' + (mkt || 'KR');
  };

  /* ── 초기화 ─────────────────────────────── */
  loadSidebarScreener();
})();
</script>
</body>
</html>
