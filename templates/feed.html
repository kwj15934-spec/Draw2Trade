<html lang="ko">
<head>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:     #0f0f12;
      --bg2:    #18181c;
      --bg3:    #1e1e24;
      --teal:   #26a69a;
      --orange: #ff6b35;
      --red:    #ef5350;
      --text:   #d4d8e2;
      --muted:  #7a8499;
      --border: #27272a;
    }
    html, body { min-height: 100%; background: var(--bg); color: var(--text);
      font-family: 'Pretendard Variable', 'Pretendard', 'Segoe UI', system-ui, sans-serif;
      font-size: 13px; line-height: 1.5; }

    /* ── 네비 ─────────────────────────────────── */
    .d2t-nav {
      position: sticky; top: 0; z-index: 100;
      height: 48px; background: #18181b; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 20px; gap: 8px;
    }
    .d2t-brand {
      font-size: 15px; font-weight: 800; color: var(--orange);
      text-decoration: none; display: flex; align-items: center; gap: 7px; white-space: nowrap;
    }
    .d2t-brand img { height: 22px; width: 22px; object-fit: contain; }
    .nav-spacer { flex: 1; }
    .nav-link {
      display: flex; align-items: center; height: 26px; padding: 0 10px;
      font-size: 11px; color: var(--muted); border: 1px solid var(--border);
      border-radius: 5px; text-decoration: none; white-space: nowrap;
      transition: color .15s, border-color .15s;
    }
    .nav-link:hover  { color: #d4d8e2; border-color: var(--teal); }
    .nav-link.active { color: var(--teal); border-color: var(--teal); }

    /* ── 레이아웃 ─────────────────────────────── */
    .page-body {
      max-width: 1080px; margin: 0 auto;
      display: grid; grid-template-columns: 1fr 300px;
      gap: 24px; padding: 28px 20px 60px;
    }
    @media (max-width: 760px) {
      .page-body { grid-template-columns: 1fr; }
      .feed-sidebar { display: none; }
    }

    .page-header { margin-bottom: 20px; }
    .page-header h1 { font-size: 20px; font-weight: 800; color: #fff; margin-bottom: 4px; }
    .page-header p  { font-size: 12px; color: var(--muted); }

    /* ── 피드 탭 ──────────────────────────────── */
    .feed-tabs {
      display: flex; gap: 0; border-bottom: 1px solid var(--border);
      margin-bottom: 20px; overflow-x: auto; scrollbar-width: none;
    }
    .feed-tabs::-webkit-scrollbar { display: none; }
    .feed-tab {
      flex-shrink: 0; padding: 8px 16px; font-size: 12px; font-weight: 600;
      color: var(--muted); background: none; border: none; border-bottom: 2px solid transparent;
      cursor: pointer; transition: color .15s, border-color .15s; white-space: nowrap;
    }
    .feed-tab.active { color: #d4d8e2; border-bottom-color: var(--teal); }
    .feed-tab:hover  { color: #a0a8b8; }

    /* ── 피드 카드 그리드 ─────────────────────── */
    .feed-grid {
      display: flex; flex-direction: column; gap: 12px;
    }

    /* ── 인사이트 카드 (토스 스타일) ────────── */
    .insight-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 12px; padding: 18px 20px;
      transition: border-color .15s, transform .1s;
    }
    .insight-card:hover { border-color: rgba(38,166,154,.4); transform: translateY(-1px); }

    .ic-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 12px; margin-bottom: 10px;
    }
    .ic-category {
      font-size: 10px; font-weight: 700; letter-spacing: .8px;
      text-transform: uppercase; color: var(--teal);
      background: rgba(38,166,154,.1); padding: 2px 7px; border-radius: 4px;
    }
    .ic-time { font-size: 10px; color: var(--muted); white-space: nowrap; }

    .ic-title {
      font-size: 15px; font-weight: 700; color: #fff;
      margin-bottom: 8px; line-height: 1.4;
    }
    .ic-body {
      font-size: 13px; color: var(--muted); line-height: 1.65;
      margin-bottom: 12px;
    }

    /* 수치 하이라이트 행 */
    .ic-stats {
      display: flex; gap: 16px; flex-wrap: wrap;
      padding: 10px 0; border-top: 1px solid rgba(255,255,255,.05);
    }
    .ic-stat { display: flex; flex-direction: column; gap: 2px; }
    .ic-stat-label { font-size: 10px; color: var(--muted); }
    .ic-stat-value {
      font-size: 14px; font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
    }
    .val-up   { color: #ef5350; }
    .val-down { color: var(--teal); }
    .val-flat { color: #d4d8e2; }

    /* 종목 태그 */
    .ic-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
    .ic-tag {
      font-size: 10px; padding: 3px 8px; border-radius: 5px;
      background: var(--bg3); color: var(--muted); border: 1px solid var(--border);
      cursor: pointer; transition: color .15s, border-color .15s;
    }
    .ic-tag:hover { color: var(--teal); border-color: var(--teal); }

    /* ── 지수 카드 (큰 배너) ────────────────── */
    .index-banner {
      background: linear-gradient(135deg, #1a1f2e 0%, #18181c 100%);
      border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px;
      display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 14px;
    }
    .idx-item { display: flex; flex-direction: column; gap: 4px; }
    .idx-name { font-size: 10px; color: var(--muted); font-weight: 700; letter-spacing: .5px; }
    .idx-val  { font-size: 18px; font-weight: 800; font-family: 'JetBrains Mono', monospace; color: #fff; }
    .idx-chg  { font-size: 11px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
    .chg-up   { color: #ef5350; }
    .chg-down { color: var(--teal); }

    /* ── 로딩 ────────────────────────────────── */
    .feed-loading {
      text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px;
    }
    .feed-spinner {
      width: 28px; height: 28px; margin: 0 auto 12px;
      border: 2px solid rgba(255,255,255,.08); border-top-color: var(--teal);
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 사이드바 ─────────────────────────────── */
    .feed-sidebar { display: flex; flex-direction: column; gap: 16px; }

    .sidebar-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 10px; padding: 16px;
    }
    .sidebar-card-title {
      font-size: 11px; font-weight: 700; color: var(--muted);
      letter-spacing: .8px; text-transform: uppercase; margin-bottom: 12px;
    }

    /* 종목 스크리너 */
    .screener-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,.04); cursor: pointer;
    }
    .screener-row:last-child { border-bottom: none; }
    .screener-row:hover .sc-name { color: var(--teal); }
    .sc-name  { font-size: 12px; color: #d4d8e2; font-weight: 600; }
    .sc-code  { font-size: 10px; color: var(--muted); }
    .sc-pct   { font-size: 12px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }


    footer {
      padding: 32px 20px; text-align: center; color: var(--muted); font-size: 11px;
      border-top: 1px solid var(--border); max-width: 1080px; margin: 0 auto;
    }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--teal); }

  /* ── 지수 카드 렌더 ─────────────────────── */
  function renderIndexBanner(data) {
    if (!data || !data.length) return '';
    return '<div class="index-banner">' +
      data.map(function (d) {
        var cls = d.chg >= 0 ? 'chg-up' : 'chg-down';
        var sign = d.chg >= 0 ? '+' : '';
        return '<div class="idx-item">' +
          '<div class="idx-name">' + esc(d.name) + '</div>' +
          '<div class="idx-val">' + esc(d.val) + '</div>' +
          '<div class="idx-chg ' + cls + '">' + sign + esc(String(d.chg.toFixed(2))) + '%</div>' +
        '</div>';
      }).join('') +
    '</div>';
  }

  /* ── 피드 카드 렌더 ─────────────────────── */
  function renderCard(card, extraHtml) {
    var tagsHtml = '';
    if (card.tags && card.tags.length) {
      tagsHtml = '<div class="ic-tags">' + card.tags.map(function (t) {
        var onclick = t.link
          ? 'onclick="location.href=\'' + esc(t.link) + '\'"'
          : 'onclick="goChart(\'' + esc(t.sym) + '\',\'' + esc(t.market) + '\')"';
        return '<span class="ic-tag" ' + onclick + '>' + esc(t.label) + '</span>';
      }).join('') + '</div>';
    }

    var statsHtml = '';
    if (card.stats && card.stats.length) {
      statsHtml = '<div class="ic-stats">' + card.stats.map(function (s) {
        var cls = s.up ? 'val-up' : s.down ? 'val-down' : 'val-flat';
        return '<div class="ic-stat">' +
          '<div class="ic-stat-label">' + esc(s.label) + '</div>' +
          '<div class="ic-stat-value ' + cls + '">' + esc(s.value) + '</div>' +
        '</div>';
      }).join('') + '</div>';
    }

    return '<div class="insight-card">' +
      '<div class="ic-header">' +
        '<span class="ic-category">' + esc(card.category) + '</span>' +
        '<span class="ic-time">' + esc(card.time) + '</span>' +
      '</div>' +
      '<div class="ic-title">' + esc(card.title) + '</div>' +
      '<div class="ic-body">' + esc(card.body) + '</div>' +
      (extraHtml || '') +
      statsHtml +
      tagsHtml +
    '</div>';
  }

  /* ── 스크리너 렌더 ──────────────────────── */
  function renderScreener(elId, items, dir) {
    var el = document.getElementById(elId);
    if (!el) return;
    if (!items || !items.length) {
      el.innerHTML = '<div style="font-size:12px;color:var(--muted);padding:8px 0;">데이터 없음</div>';
      return;
    }
    el.innerHTML = items.map(function (it) {
      var pct   = it.chg_rate != null ? it.chg_rate : 0;
      var cls   = pct >= 0 ? 'pct-up' : 'pct-down';
      var sign  = pct >= 0 ? '+' : '';
      return '<div class="screener-row" onclick="goChart(\'' + esc(it.symbol||it.code||'') + '\',\'KR\')">' +
        '<div>' +
          '<div class="sc-name">' + esc(it.name||it.symbol||'') + '</div>' +
          '<div class="sc-code">' + esc(it.symbol||it.code||'') + '</div>' +
        '</div>' +
        '<span class="sc-pct ' + cls + '">' + sign + pct.toFixed(2) + '%</span>' +
      '</div>';
    }).join('');
  }

  /* ── 피드 렌더 ──────────────────────────── */
  function render() {
    var cards = STATIC_FEED[_tab] || [];
    var grid  = document.getElementById('feed-grid');

    var html = '';
    cards.forEach(function (card) {
      var extra = '';
      if (card.statsId === 'index-stats') {
        extra = '<div id="index-stats-placeholder"></div>';
      }
      html += renderCard(card, extra);
    });

    if (!html) html = '<div class="feed-loading">준비 중입니다.</div>';
    grid.innerHTML = html;

    // 지수 배너 비동기 주입
    if (_tab === 'overview') injectIndexBanner();
    // KR 스크리너 주입
    if (_tab === 'kr') injectKrScreener();
  }

  /* ── 지수 데이터 fetch (스캐너 API 활용) ── */
  function injectIndexBanner() {
    // 지수 배너 플레이스홀더에 스피너 표시
    var placeholder = document.getElementById('index-stats-placeholder');
    if (placeholder) placeholder.innerHTML =
      '<div class="feed-loading" style="padding:20px 0;"><div class="feed-spinner"></div></div>';

    fetch('/api/v1/stock/market/scanner/change-rate?market=KR&limit=5')
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (d) {
        if (!placeholder) return;
        // 지수 더미 데이터 + 실제 상위 종목으로 배너 구성
        var indexData = [
          { name: 'KOSPI', val: '—', chg: 0 },
          { name: 'KOSDAQ', val: '—', chg: 0 },
          { name: 'S&P 500', val: '—', chg: 0 },
          { name: 'NASDAQ', val: '—', chg: 0 },
        ];
        placeholder.innerHTML = renderIndexBanner(indexData) +
          '<div style="font-size:10px;color:var(--muted);margin-top:8px;">※ 지수 실시간 연동은 준비 중입니다. 아래 스크리너로 개별 종목을 확인하세요.</div>';
      })
      .catch(function () {
        if (placeholder) placeholder.innerHTML =
          '<div style="font-size:12px;color:var(--muted);padding:8px 0;">지수 데이터를 불러오지 못했습니다.</div>';
      });
  }

  function injectKrScreener() {
    fetch('/api/v1/stock/market/scanner/change-rate?market=KR&limit=10')
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (d) {
        var items = (d && d.items) || [];
        var upItems   = items.filter(function (i) { return (i.chg_rate || 0) > 0; }).slice(0, 5);
        var downItems = items.filter(function (i) { return (i.chg_rate || 0) < 0; }).slice(0, 5);
        // 카드 내에 KR 스크리너 주입
        var grid = document.getElementById('feed-grid');
        var screenEl = grid ? grid.querySelector('[data-screener="kr"]') : null;
        if (screenEl) {
          screenEl.innerHTML = renderScreenerRows(upItems);
        }
      })
      .catch(function () {});
  }

  function renderScreenerRows(items) {
    return items.map(function (it) {
      var pct = it.chg_rate != null ? it.chg_rate : 0;
      var cls = pct >= 0 ? 'pct-up' : 'pct-down';
      var sign = pct >= 0 ? '+' : '';
      return '<div class="screener-row" onclick="goChart(\'' + esc(it.symbol||'') + '\',\'KR\')">' +
        '<div><div class="sc-name">' + esc(it.name||it.symbol||'') + '</div>' +
        '<div class="sc-code">' + esc(it.symbol||'') + '</div></div>' +
        '<span class="sc-pct ' + cls + '">' + sign + pct.toFixed(2) + '%</span>' +
      '</div>';
    }).join('');
  }

  /* ── 사이드바 스크리너 fetch ─────────────── */
  function loadSidebarScreener() {
    fetch('/api/v1/stock/market/scanner/change-rate?market=KR&limit=20')
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (d) {
        var items = (d && d.items) || [];
        var up   = items.filter(function (i) { return (i.chg_rate||0) > 0; })
                        .sort(function (a,b) { return b.chg_rate - a.chg_rate; }).slice(0, 5);
        var down = items.filter(function (i) { return (i.chg_rate||0) < 0; })
                        .sort(function (a,b) { return a.chg_rate - b.chg_rate; }).slice(0, 5);
        renderScreener('screener-up',   up,   'up');
        renderScreener('screener-down', down, 'down');
      })
      .catch(function () {
        renderScreener('screener-up',   [], 'up');
        renderScreener('screener-down', [], 'down');
      });
  }

  /* ── 유틸 ───────────────────────────────── */
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  window.goChart = function (sym, mkt) {
    if (!sym) return;
    window.location.href = '/app?symbol=' + encodeURIComponent(sym) + '&market=' + (mkt || 'KR');
  };

  /* ── 탭 이벤트 ───────────────────────────── */
  document.querySelectorAll('.feed-tab').forEach(function (btn) {
    btn.addEventListener('click', function () {
      document.querySelectorAll('.feed-tab').forEach(function (b) { b.classList.remove('active'); });
      this.classList.add('active');
      _tab = this.dataset.tab;
      render();
    });
  });

  /* ── 초기화 ─────────────────────────────── */
  render();
  loadSidebarScreener();
})();
</script>
</body>
</html>
